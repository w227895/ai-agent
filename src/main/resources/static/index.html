<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Few-shot 配置中心</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #fff;
            --soft: #f8fafc;
            --line: #d9e0e8;
            --line-strong: #b9c4d0;
            --text: #172033;
            --muted: #677487;
            --primary: #176b5f;
            --primary-dark: #0f5148;
            --primary-soft: #e2f3ef;
            --danger: #b42318;
            --ok: #18744d;
            --mono-bg: #101828;
            --mono-text: #f8fafc;
            --shadow: 0 10px 28px rgba(31, 41, 55, .08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.55 "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        button, input, select, textarea { font: inherit; }
        button {
            min-height: 36px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { border-color: var(--line-strong); background: var(--soft); }
        button.primary { border-color: var(--primary); background: var(--primary); color: #fff; }
        button.primary:hover { background: var(--primary-dark); }
        button.danger { color: var(--danger); border-color: #efc2bc; }
        button:disabled { opacity: .58; cursor: not-allowed; }
        input, select, textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            outline: none;
        }
        input, select { min-height: 38px; padding: 0 10px; }
        textarea { min-height: 110px; padding: 10px 12px; resize: vertical; }
        textarea.tall { min-height: 230px; }
        textarea.mono, pre { font-family: Consolas, "Microsoft YaHei", monospace; }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(23, 107, 95, .13);
        }
        label { color: var(--muted); font-size: 12px; font-weight: 800; }
        .shell { min-height: 100vh; display: grid; grid-template-columns: 232px minmax(0, 1fr); }
        .side {
            position: sticky;
            top: 0;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 18px;
            padding: 22px 16px;
            border-right: 1px solid var(--line);
            background: var(--surface);
        }
        .brand { display: grid; gap: 4px; padding: 0 6px 16px; border-bottom: 1px solid var(--line); }
        .brand h1 { margin: 0; font-size: 19px; }
        .brand p { margin: 0; color: var(--muted); font-size: 12px; }
        .nav { display: grid; align-content: start; gap: 8px; }
        .nav button {
            width: 100%;
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            text-align: left;
            min-height: 42px;
            border-color: transparent;
            background: transparent;
        }
        .nav button.active { color: var(--primary-dark); border-color: #bfe2dc; background: var(--primary-soft); }
        .nav-icon {
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--soft);
            font-weight: 900;
        }
        .side-foot { color: var(--muted); font-size: 12px; }
        .main { min-width: 0; display: grid; grid-template-rows: auto 1fr; }
        .topbar {
            position: sticky;
            top: 0;
            z-index: 4;
            min-height: 74px;
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            padding: 16px 26px;
            border-bottom: 1px solid var(--line);
            background: rgba(255,255,255,.94);
            backdrop-filter: blur(10px);
        }
        .topbar h2 { margin: 0; font-size: 22px; }
        .topbar p { margin: 3px 0 0; color: var(--muted); }
        .message { min-height: 24px; color: var(--muted); font-weight: 800; }
        .message.ok { color: var(--ok); }
        .message.error { color: var(--danger); }
        .content { min-width: 0; padding: 22px 26px 36px; }
        .view { display: none; }
        .view.active { display: grid; gap: 16px; }
        .list-edit {
            display: grid;
            grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
            gap: 16px;
            align-items: start;
        }
        .panel {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .panel-head {
            min-height: 58px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
        }
        .panel-head h3 { margin: 0; font-size: 15px; }
        .panel-body { display: grid; gap: 15px; padding: 16px; }
        .search-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
        .list {
            max-height: calc(100vh - 230px);
            overflow: auto;
            display: grid;
            align-content: start;
            gap: 8px;
        }
        .item {
            width: 100%;
            min-height: 64px;
            display: grid;
            gap: 2px;
            padding: 10px 11px;
            text-align: left;
            border: 1px solid var(--line);
            background: #fff;
        }
        .item.active { color: var(--primary-dark); border-color: #b8ddd5; background: var(--primary-soft); }
        .item-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-meta { color: var(--muted); font-size: 12px; font-family: Consolas, "Microsoft YaHei", monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-note { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .empty {
            min-height: 160px;
            display: grid;
            place-items: center;
            border: 1px dashed var(--line-strong);
            border-radius: 8px;
            color: var(--muted);
            background: var(--soft);
            text-align: center;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .field { display: grid; gap: 7px; }
        .actions { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
        .editor-actions { justify-content: flex-end; padding: 12px 16px; border-top: 1px solid var(--line); background: #fbfcfd; }
        .split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .result {
            min-height: 360px;
            margin: 0;
            padding: 14px;
            overflow: auto;
            white-space: pre-wrap;
            border: 1px solid #293449;
            border-radius: 8px;
            background: var(--mono-bg);
            color: var(--mono-text);
        }
        .pill {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 9px;
            border-radius: 999px;
            color: var(--primary-dark);
            background: var(--primary-soft);
            font-size: 12px;
            font-weight: 800;
        }
        @media (max-width: 1080px) {
            .shell, .list-edit, .split, .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .side { position: static; height: auto; }
            .list { max-height: none; }
            .topbar { position: static; display: grid; }
        }
    </style>
</head>
<body>
<div class="shell">
    <aside class="side">
        <div class="brand">
            <h1>Few-shot 配置中心</h1>
            <p>列表选择，右侧编辑</p>
        </div>
        <nav class="nav" aria-label="主导航">
            <button class="active" type="button" data-view="scenarios"><span class="nav-icon">S</span><span>场景列表</span></button>
            <button type="button" data-view="prompts"><span class="nav-icon">P</span><span>主提示词列表</span></button>
            <button type="button" data-view="examples"><span class="nav-icon">F</span><span>Few-shot 列表</span></button>
            <button type="button" data-view="schemas"><span class="nav-icon">J</span><span>输出结构列表</span></button>
            <button type="button" data-view="run"><span class="nav-icon">R</span><span>运行测试</span></button>
        </nav>
        <div class="side-foot">
            <div>当前场景</div>
            <strong id="sideCurrent">-</strong>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <h2 id="pageTitle">场景列表</h2>
                <p id="pageSubtitle">先从列表选择场景，再编辑它的主提示词、示例和输出结构</p>
            </div>
            <div class="message" id="message"></div>
        </header>

        <section class="content">
            <section class="view active" data-panel="scenarios">
                <div class="list-edit">
                    <div class="panel">
                        <div class="panel-head">
                            <h3>场景</h3>
                            <button class="primary" id="newScenarioButton" type="button">新增</button>
                        </div>
                        <div class="panel-body">
                            <div class="search-row">
                                <input id="scenarioSearch" placeholder="搜索场景">
                                <button id="refreshButton" type="button">刷新</button>
                            </div>
                            <div class="list" id="scenarioList"></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-head">
                            <h3>编辑场景</h3>
                            <span class="pill" id="scenarioCount">0 个场景</span>
                        </div>
                        <div class="panel-body">
                            <div class="grid-2">
                                <div class="field">
                                    <label for="scenarioCode">场景编码</label>
                                    <input id="scenarioCode">
                                </div>
                                <div class="field">
                                    <label for="scenarioName">场景名称</label>
                                    <input id="scenarioName">
                                </div>
                            </div>
                            <div class="grid-3">
                                <div class="field">
                                    <label for="inputLabel">输入标签</label>
                                    <input id="inputLabel">
                                </div>
                                <div class="field">
                                    <label for="activePrompt">默认主提示词</label>
                                    <select id="activePrompt"></select>
                                </div>
                                <div class="field">
                                    <label for="activeSchema">默认输出结构</label>
                                    <select id="activeSchema"></select>
                                </div>
                            </div>
                            <div class="field">
                                <label for="scenarioDescription">场景说明</label>
                                <textarea id="scenarioDescription"></textarea>
                            </div>
                        </div>
                        <div class="actions editor-actions">
                            <button class="primary" id="saveScenarioButton" type="button">保存场景</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="view" data-panel="prompts">
                <div class="list-edit">
                    <div class="panel">
                        <div class="panel-head">
                            <h3>主提示词</h3>
                            <button class="primary" id="newPromptButton" type="button">新增</button>
                        </div>
                        <div class="panel-body">
                            <div class="field">
                                <label for="promptScenarioFilter">所属场景</label>
                                <select id="promptScenarioFilter"></select>
                            </div>
                            <input id="promptSearch" placeholder="搜索提示词">
                            <div class="list" id="promptList"></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-head">
                            <h3>编辑主提示词</h3>
                            <span class="pill" id="promptCount">0 个提示词</span>
                        </div>
                        <div class="panel-body">
                            <div class="grid-3">
                                <div class="field">
                                    <label for="promptCode">提示词编码</label>
                                    <input id="promptCode">
                                </div>
                                <div class="field">
                                    <label for="promptActive">状态</label>
                                    <select id="promptActive">
                                        <option value="true">启用</option>
                                        <option value="false">停用</option>
                                    </select>
                                </div>
                                <div class="field">
                                    <label for="priority">优先级</label>
                                    <input id="priority" type="number">
                                </div>
                            </div>
                            <div class="grid-3">
                                <div class="field">
                                    <label for="codeType">代码类型</label>
                                    <input id="codeType">
                                </div>
                                <div class="field">
                                    <label for="templateType">模板类型</label>
                                    <input id="templateType">
                                </div>
                                <div class="field">
                                    <label for="mailType">邮件类型</label>
                                    <input id="mailType" type="number">
                                </div>
                            </div>
                            <div class="field">
                                <label for="systemPrompt">System Prompt</label>
                                <textarea class="tall" id="systemPrompt"></textarea>
                            </div>
                            <div class="field">
                                <label for="userPrompt">User Prompt 模板</label>
                                <textarea class="tall" id="userPrompt" placeholder="可使用 {current_time} 和 {email_content}"></textarea>
                            </div>
                        </div>
                        <div class="actions editor-actions">
                            <button class="primary" id="savePromptButton" type="button">保存主提示词</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="view" data-panel="examples">
                <div class="list-edit">
                    <div class="panel">
                        <div class="panel-head">
                            <h3>Few-shot</h3>
                            <button class="primary" id="newExampleButton" type="button">新增</button>
                        </div>
                        <div class="panel-body">
                            <div class="field">
                                <label for="examplePromptFilter">所属主提示词</label>
                                <select id="examplePromptFilter"></select>
                            </div>
                            <input id="exampleSearch" placeholder="搜索示例">
                            <div class="list" id="exampleList"></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-head">
                            <h3>编辑 Few-shot</h3>
                            <span class="pill" id="exampleCount">0 个示例</span>
                        </div>
                        <div class="panel-body">
                            <div class="grid-3">
                                <div class="field">
                                    <label for="exampleId">示例编码</label>
                                    <input id="exampleId">
                                </div>
                                <div class="field">
                                    <label for="exampleTitle">标题</label>
                                    <input id="exampleTitle">
                                </div>
                                <div class="field">
                                    <label for="exampleTags">标签</label>
                                    <input id="exampleTags" placeholder="航变, 时间">
                                </div>
                            </div>
                            <div class="split">
                                <div class="field">
                                    <label for="exampleInput">输入</label>
                                    <textarea class="tall" id="exampleInput"></textarea>
                                </div>
                                <div class="field">
                                    <label for="exampleExpected">期望输出 JSON</label>
                                    <textarea class="tall mono" id="exampleExpected"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="actions editor-actions">
                            <button class="danger" id="deleteExampleButton" type="button">删除示例</button>
                            <button class="primary" id="saveExamplesButton" type="button">保存 Few-shot</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="view" data-panel="schemas">
                <div class="list-edit">
                    <div class="panel">
                        <div class="panel-head">
                            <h3>输出结构</h3>
                            <button class="primary" id="newSchemaButton" type="button">新增</button>
                        </div>
                        <div class="panel-body">
                            <div class="field">
                                <label for="schemaPromptFilter">所属主提示词</label>
                                <select id="schemaPromptFilter"></select>
                            </div>
                            <input id="schemaSearch" placeholder="搜索输出结构">
                            <div class="list" id="schemaList"></div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-head">
                            <h3>编辑输出结构</h3>
                            <span class="pill" id="schemaCount">0 个结构</span>
                        </div>
                        <div class="panel-body">
                            <div class="grid-3">
                                <div class="field">
                                    <label for="schemaCode">结构编码</label>
                                    <input id="schemaCode">
                                </div>
                                <div class="field">
                                    <label for="schemaName">结构名称</label>
                                    <input id="schemaName">
                                </div>
                                <div class="field">
                                    <label for="schemaActive">状态</label>
                                    <select id="schemaActive">
                                        <option value="true">启用</option>
                                        <option value="false">停用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="field">
                                <label for="schemaJson">目标 JSON 结构</label>
                                <textarea class="tall mono" id="schemaJson"></textarea>
                            </div>
                            <div class="field">
                                <label for="fieldDescriptionJson">字段说明 JSON</label>
                                <textarea class="tall mono" id="fieldDescriptionJson"></textarea>
                            </div>
                            <div class="field">
                                <label for="emptyValueRule">空值规则</label>
                                <textarea id="emptyValueRule"></textarea>
                            </div>
                        </div>
                        <div class="actions editor-actions">
                            <button class="primary" id="saveSchemaButton" type="button">保存输出结构</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="view" data-panel="run">
                <div class="panel">
                    <div class="panel-head">
                        <h3>运行测试</h3>
                        <div class="actions">
                            <button id="useExampleButton" type="button">使用当前示例</button>
                            <button id="previewButton" type="button">预览 Prompt</button>
                            <button class="primary" id="runButton" type="button">运行测试</button>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="grid-3">
                            <div class="field">
                                <label for="runScenarioSelect">场景</label>
                                <select id="runScenarioSelect"></select>
                            </div>
                            <div class="field">
                                <label for="runPromptSelect">主提示词</label>
                                <select id="runPromptSelect"></select>
                            </div>
                            <div class="field">
                                <label for="runSchemaSelect">输出结构</label>
                                <select id="runSchemaSelect"></select>
                            </div>
                        </div>
                        <div class="split">
                            <div class="field">
                                <label for="runInput">测试输入</label>
                                <textarea class="tall" id="runInput"></textarea>
                            </div>
                            <div class="field">
                                <label for="runResult">结果</label>
                                <pre class="result" id="runResult"></pre>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </section>
    </main>
</div>

<script>
const state = {
    scenarios: [],
    view: "scenarios",
    scenarioCode: "",
    promptCode: "",
    schemaCode: "",
    exampleIndex: 0,
    searches: { scenarios: "", prompts: "", examples: "", schemas: "" }
};

const $ = (id) => document.getElementById(id);
const els = {
    pageTitle: $("pageTitle"),
    pageSubtitle: $("pageSubtitle"),
    message: $("message"),
    sideCurrent: $("sideCurrent"),
    scenarioList: $("scenarioList"),
    scenarioSearch: $("scenarioSearch"),
    scenarioCount: $("scenarioCount"),
    scenarioCode: $("scenarioCode"),
    scenarioName: $("scenarioName"),
    inputLabel: $("inputLabel"),
    activePrompt: $("activePrompt"),
    activeSchema: $("activeSchema"),
    scenarioDescription: $("scenarioDescription"),
    promptScenarioFilter: $("promptScenarioFilter"),
    promptList: $("promptList"),
    promptSearch: $("promptSearch"),
    promptCount: $("promptCount"),
    promptCode: $("promptCode"),
    promptActive: $("promptActive"),
    priority: $("priority"),
    codeType: $("codeType"),
    templateType: $("templateType"),
    mailType: $("mailType"),
    systemPrompt: $("systemPrompt"),
    userPrompt: $("userPrompt"),
    examplePromptFilter: $("examplePromptFilter"),
    exampleList: $("exampleList"),
    exampleSearch: $("exampleSearch"),
    exampleCount: $("exampleCount"),
    exampleId: $("exampleId"),
    exampleTitle: $("exampleTitle"),
    exampleTags: $("exampleTags"),
    exampleInput: $("exampleInput"),
    exampleExpected: $("exampleExpected"),
    schemaPromptFilter: $("schemaPromptFilter"),
    schemaList: $("schemaList"),
    schemaSearch: $("schemaSearch"),
    schemaCount: $("schemaCount"),
    schemaCode: $("schemaCode"),
    schemaName: $("schemaName"),
    schemaActive: $("schemaActive"),
    schemaJson: $("schemaJson"),
    fieldDescriptionJson: $("fieldDescriptionJson"),
    emptyValueRule: $("emptyValueRule"),
    runScenarioSelect: $("runScenarioSelect"),
    runPromptSelect: $("runPromptSelect"),
    runSchemaSelect: $("runSchemaSelect"),
    runInput: $("runInput"),
    runResult: $("runResult")
};

const viewCopy = {
    scenarios: ["场景列表", "新增或编辑售后、航变等业务场景"],
    prompts: ["主提示词列表", "按场景维护多个主提示词"],
    examples: ["Few-shot 列表", "按主提示词维护示例"],
    schemas: ["输出结构列表", "按主提示词维护多个输出结构"],
    run: ["运行测试", "选择场景、主提示词和输出结构进行测试"]
};

document.querySelectorAll(".nav button").forEach((button) => {
    button.addEventListener("click", () => setView(button.dataset.view));
});
$("refreshButton").addEventListener("click", loadAll);
$("newScenarioButton").addEventListener("click", newScenario);
$("saveScenarioButton").addEventListener("click", saveScenario);
$("newPromptButton").addEventListener("click", newPrompt);
$("savePromptButton").addEventListener("click", savePrompt);
$("newExampleButton").addEventListener("click", newExample);
$("deleteExampleButton").addEventListener("click", deleteExample);
$("saveExamplesButton").addEventListener("click", savePrompt);
$("newSchemaButton").addEventListener("click", newSchema);
$("saveSchemaButton").addEventListener("click", saveSchema);
$("useExampleButton").addEventListener("click", useCurrentExample);
$("previewButton").addEventListener("click", previewPrompt);
$("runButton").addEventListener("click", runTest);

[
    ["scenarioSearch", "scenarios"],
    ["promptSearch", "prompts"],
    ["exampleSearch", "examples"],
    ["schemaSearch", "schemas"]
].forEach(([id, key]) => {
    $(id).addEventListener("input", (event) => {
        state.searches[key] = event.target.value.trim().toLowerCase();
        renderAll();
    });
});

els.promptScenarioFilter.addEventListener("change", () => selectScenario(els.promptScenarioFilter.value, true));
els.examplePromptFilter.addEventListener("change", () => selectPrompt(els.examplePromptFilter.value, true));
els.schemaPromptFilter.addEventListener("change", () => selectPrompt(els.schemaPromptFilter.value, true));
els.activePrompt.addEventListener("change", () => {
    state.promptCode = els.activePrompt.value;
    state.schemaCode = currentPrompt()?.outputSchemas?.[0]?.schemaCode || "";
    renderAll();
});
els.activeSchema.addEventListener("change", () => {
    state.schemaCode = els.activeSchema.value;
    renderAll();
});
els.runScenarioSelect.addEventListener("change", () => selectScenario(els.runScenarioSelect.value, true));
els.runPromptSelect.addEventListener("change", () => selectPrompt(els.runPromptSelect.value, true));
els.runSchemaSelect.addEventListener("change", () => {
    state.schemaCode = els.runSchemaSelect.value;
    renderAll();
});

loadAll();

async function loadAll() {
    setMessage("正在加载配置...");
    try {
        state.scenarios = await getJson("/few-shot/scenarios");
        if (!state.scenarioCode && state.scenarios.length) state.scenarioCode = state.scenarios[0].code;
        normalizeSelection();
        renderAll();
        setMessage("配置已加载", "ok");
    } catch (error) {
        setMessage(`加载失败：${error.message}`, "error");
    }
}

function setView(view) {
    state.view = view;
    const [title, subtitle] = viewCopy[view] || viewCopy.scenarios;
    els.pageTitle.textContent = title;
    els.pageSubtitle.textContent = subtitle;
    document.querySelectorAll(".nav button").forEach((button) => button.classList.toggle("active", button.dataset.view === view));
    document.querySelectorAll(".view").forEach((panel) => panel.classList.toggle("active", panel.dataset.panel === view));
    renderAll();
}

function normalizeSelection() {
    const scenario = currentScenario();
    if (!scenario) return;
    const prompts = scenario.prompts || [];
    if (!state.promptCode || !prompts.some((item) => item.promptCode === state.promptCode)) {
        state.promptCode = scenario.promptCode || prompts[0]?.promptCode || "";
    }
    const schemas = currentPrompt()?.outputSchemas || [];
    if (!state.schemaCode || !schemas.some((item) => item.schemaCode === state.schemaCode)) {
        state.schemaCode = scenario.schemaCode || schemas[0]?.schemaCode || "";
    }
    const examples = currentPrompt()?.examples || [];
    if (state.exampleIndex >= examples.length) state.exampleIndex = 0;
}

function renderAll() {
    normalizeSelection();
    renderSelects();
    renderScenarioList();
    renderScenarioEditor();
    renderPromptList();
    renderPromptEditor();
    renderExampleList();
    renderExampleEditor();
    renderSchemaList();
    renderSchemaEditor();
    renderRunPanel();
    const scenario = currentScenario();
    els.sideCurrent.textContent = scenario ? `${scenario.name || scenario.code}` : "-";
}

function renderSelects() {
    const scenarioOptions = state.scenarios.map((scenario) =>
        `<option value="${escapeHtml(scenario.code)}">${escapeHtml(scenario.name || scenario.code)}</option>`
    ).join("");
    els.promptScenarioFilter.innerHTML = scenarioOptions;
    els.promptScenarioFilter.value = state.scenarioCode;
    els.runScenarioSelect.innerHTML = scenarioOptions;
    els.runScenarioSelect.value = state.scenarioCode;

    const promptOptions = (currentScenario()?.prompts || []).map((prompt) =>
        `<option value="${escapeHtml(prompt.promptCode)}">${escapeHtml(prompt.promptCode)}</option>`
    ).join("");
    els.examplePromptFilter.innerHTML = promptOptions;
    els.examplePromptFilter.value = state.promptCode;
    els.schemaPromptFilter.innerHTML = promptOptions;
    els.schemaPromptFilter.value = state.promptCode;
    els.runPromptSelect.innerHTML = promptOptions;
    els.runPromptSelect.value = state.promptCode;

    const schemaOptions = (currentPrompt()?.outputSchemas || []).map((schema) =>
        `<option value="${escapeHtml(schema.schemaCode)}">${escapeHtml(schema.schemaName || schema.schemaCode)}</option>`
    ).join("");
    els.activeSchema.innerHTML = schemaOptions;
    els.activeSchema.value = state.schemaCode;
    els.runSchemaSelect.innerHTML = schemaOptions;
    els.runSchemaSelect.value = state.schemaCode;
}

function renderScenarioList() {
    const items = state.scenarios.filter((scenario) => matchSearch([scenario.code, scenario.name, scenario.description], state.searches.scenarios));
    els.scenarioCount.textContent = `${state.scenarios.length} 个场景`;
    els.scenarioList.innerHTML = items.map((scenario) => `
        <button class="item ${scenario.code === state.scenarioCode ? "active" : ""}" type="button" data-code="${escapeHtml(scenario.code)}">
            <strong class="item-title">${escapeHtml(scenario.name || scenario.code)}</strong>
            <span class="item-meta">${escapeHtml(scenario.code)}</span>
            <span class="item-note">${(scenario.prompts || []).length} 个主提示词</span>
        </button>
    `).join("") || `<div class="empty">没有匹配的场景</div>`;
    els.scenarioList.querySelectorAll("button[data-code]").forEach((button) => {
        button.addEventListener("click", () => selectScenario(button.dataset.code));
    });
}

function renderScenarioEditor() {
    const scenario = currentScenario();
    if (!scenario) return;
    els.scenarioCode.value = scenario.code || "";
    els.scenarioName.value = scenario.name || "";
    els.inputLabel.value = scenario.inputLabel || "邮件正文";
    els.scenarioDescription.value = scenario.description || "";
    els.activePrompt.innerHTML = (scenario.prompts || []).map((prompt) =>
        `<option value="${escapeHtml(prompt.promptCode)}">${escapeHtml(prompt.promptCode)}</option>`
    ).join("");
    els.activePrompt.value = state.promptCode;
}

function renderPromptList() {
    const prompts = (currentScenario()?.prompts || []).filter((prompt) =>
        matchSearch([prompt.promptCode, prompt.systemPrompt, prompt.userPrompt], state.searches.prompts));
    els.promptCount.textContent = `${(currentScenario()?.prompts || []).length} 个提示词`;
    els.promptList.innerHTML = prompts.map((prompt) => `
        <button class="item ${prompt.promptCode === state.promptCode ? "active" : ""}" type="button" data-code="${escapeHtml(prompt.promptCode)}">
            <strong class="item-title">${escapeHtml(prompt.promptCode)}</strong>
            <span class="item-meta">优先级 ${prompt.priority ?? 0} · ${prompt.active ? "启用" : "停用"}</span>
            <span class="item-note">${(prompt.examples || []).length} 个示例，${(prompt.outputSchemas || []).length} 个输出结构</span>
        </button>
    `).join("") || `<div class="empty">当前场景还没有主提示词</div>`;
    els.promptList.querySelectorAll("button[data-code]").forEach((button) => {
        button.addEventListener("click", () => selectPrompt(button.dataset.code));
    });
}

function renderPromptEditor() {
    const prompt = currentPrompt();
    setPromptDisabled(!prompt);
    els.promptCode.value = prompt?.promptCode || "";
    els.promptActive.value = String(prompt?.active ?? true);
    els.priority.value = prompt?.priority ?? 1;
    els.codeType.value = prompt?.codeType || "2";
    els.templateType.value = prompt?.templateType || "1";
    els.mailType.value = prompt?.mailType ?? 0;
    els.systemPrompt.value = prompt?.systemPrompt || "";
    els.userPrompt.value = prompt?.userPrompt || "";
}

function renderExampleList() {
    const examples = (currentPrompt()?.examples || []).filter((example) =>
        matchSearch([example.id, example.title, example.input, example.expectedOutput, (example.tags || []).join(",")], state.searches.examples));
    els.exampleCount.textContent = `${(currentPrompt()?.examples || []).length} 个示例`;
    els.exampleList.innerHTML = examples.map((example) => {
        const index = (currentPrompt()?.examples || []).indexOf(example);
        return `
            <button class="item ${index === state.exampleIndex ? "active" : ""}" type="button" data-index="${index}">
                <strong class="item-title">${escapeHtml(example.title || example.id || "未命名示例")}</strong>
                <span class="item-meta">${escapeHtml(example.id || "")}</span>
                <span class="item-note">${escapeHtml((example.tags || []).join(", ") || "无标签")}</span>
            </button>
        `;
    }).join("") || `<div class="empty">当前主提示词还没有 Few-shot</div>`;
    els.exampleList.querySelectorAll("button[data-index]").forEach((button) => {
        button.addEventListener("click", () => {
            persistExampleForm();
            state.exampleIndex = Number(button.dataset.index);
            renderAll();
        });
    });
}

function renderExampleEditor() {
    const example = currentExample();
    setExampleDisabled(!example);
    els.exampleId.value = example?.id || "";
    els.exampleTitle.value = example?.title || "";
    els.exampleTags.value = (example?.tags || []).join(", ");
    els.exampleInput.value = example?.input || "";
    els.exampleExpected.value = example?.expectedOutput || "";
}

function renderSchemaList() {
    const schemas = (currentPrompt()?.outputSchemas || []).filter((schema) =>
        matchSearch([schema.schemaCode, schema.schemaName, schema.schemaJson, schema.fieldDescriptionJson], state.searches.schemas));
    els.schemaCount.textContent = `${(currentPrompt()?.outputSchemas || []).length} 个结构`;
    els.schemaList.innerHTML = schemas.map((schema) => `
        <button class="item ${schema.schemaCode === state.schemaCode ? "active" : ""}" type="button" data-code="${escapeHtml(schema.schemaCode)}">
            <strong class="item-title">${escapeHtml(schema.schemaName || schema.schemaCode)}</strong>
            <span class="item-meta">${escapeHtml(schema.schemaCode)}</span>
            <span class="item-note">${schema.active ? "启用" : "停用"}</span>
        </button>
    `).join("") || `<div class="empty">当前主提示词还没有输出结构</div>`;
    els.schemaList.querySelectorAll("button[data-code]").forEach((button) => {
        button.addEventListener("click", () => {
            state.schemaCode = button.dataset.code;
            renderAll();
        });
    });
}

function renderSchemaEditor() {
    const schema = currentSchema();
    setSchemaDisabled(!schema);
    els.schemaCode.value = schema?.schemaCode || "";
    els.schemaName.value = schema?.schemaName || "";
    els.schemaActive.value = String(schema?.active ?? true);
    els.schemaJson.value = schema?.schemaJson || "";
    els.fieldDescriptionJson.value = schema?.fieldDescriptionJson || "";
    els.emptyValueRule.value = schema?.emptyValueRule || "";
}

function renderRunPanel() {
    els.runScenarioSelect.value = state.scenarioCode;
    els.runPromptSelect.value = state.promptCode;
    els.runSchemaSelect.value = state.schemaCode;
}

function selectScenario(code, keepView = false) {
    persistExampleForm();
    state.scenarioCode = code;
    state.promptCode = "";
    state.schemaCode = "";
    state.exampleIndex = 0;
    normalizeSelection();
    if (!keepView) setView("scenarios");
    else renderAll();
}

function selectPrompt(code, keepView = false) {
    persistExampleForm();
    state.promptCode = code;
    state.schemaCode = currentPrompt()?.outputSchemas?.[0]?.schemaCode || "";
    state.exampleIndex = 0;
    if (!keepView && state.view === "scenarios") setView("prompts");
    else renderAll();
}

function newScenario() {
    const code = `scenario-${Date.now()}`;
    state.scenarios.unshift({
        code,
        name: "新场景",
        description: "",
        inputLabel: "邮件正文",
        systemInstruction: "",
        outputContract: "",
        toolProfile: "none",
        promptCode: "",
        mainPrompt: null,
        prompts: [],
        schemaCode: "",
        outputSchema: null,
        examples: []
    });
    state.scenarioCode = code;
    state.promptCode = "";
    state.schemaCode = "";
    state.exampleIndex = 0;
    renderAll();
    setMessage("新场景已创建，保存后生效");
}

function newPrompt() {
    const scenario = currentScenario();
    if (!scenario) return;
    const prompt = {
        promptCode: `${scenario.code}-prompt-${Date.now()}`,
        scenarioCode: scenario.code,
        codeType: "2",
        templateType: "1",
        userPrompt: "当前时间：{current_time}\n输入内容：\n{email_content}",
        priority: 1,
        active: true,
        systemPrompt: "你是一个结构化信息抽取助手。只返回符合输出结构的 JSON。",
        mailType: 0,
        outputSchemas: [],
        examples: []
    };
    scenario.prompts = scenario.prompts || [];
    scenario.prompts.unshift(prompt);
    scenario.promptCode = prompt.promptCode;
    state.promptCode = prompt.promptCode;
    state.schemaCode = "";
    state.exampleIndex = 0;
    renderAll();
    setMessage("新主提示词已创建，保存后生效");
}

function newExample() {
    const prompt = currentPrompt();
    if (!prompt) return setMessage("请先选择或新增主提示词", "error");
    persistExampleForm();
    prompt.examples = prompt.examples || [];
    prompt.examples.unshift({
        id: `example-${Date.now()}`,
        title: "新示例",
        input: "",
        expectedOutput: "{}",
        tags: []
    });
    state.exampleIndex = 0;
    renderAll();
    setMessage("新示例已创建，保存 Few-shot 后生效");
}

function deleteExample() {
    const prompt = currentPrompt();
    if (!prompt?.examples?.length) return;
    prompt.examples.splice(state.exampleIndex, 1);
    state.exampleIndex = 0;
    renderAll();
    setMessage("示例已删除，保存 Few-shot 后生效");
}

function newSchema() {
    const prompt = currentPrompt();
    if (!prompt) return setMessage("请先选择或新增主提示词", "error");
    const schema = {
        schemaCode: `${prompt.promptCode}-schema-${Date.now()}`.toLowerCase(),
        promptCode: prompt.promptCode,
        schemaName: "新输出结构",
        schemaJson: "{}",
        fieldDescriptionJson: "{}",
        emptyValueRule: "缺失字段按类型返回空值。",
        active: true
    };
    prompt.outputSchemas = prompt.outputSchemas || [];
    prompt.outputSchemas.unshift(schema);
    state.schemaCode = schema.schemaCode;
    renderAll();
    setMessage("新输出结构已创建，保存后生效");
}

async function saveScenario() {
    const scenario = currentScenario();
    if (!scenario) return;
    scenario.code = normalizeCode(els.scenarioCode.value);
    scenario.name = els.scenarioName.value.trim() || scenario.code;
    scenario.inputLabel = els.inputLabel.value.trim() || "邮件正文";
    scenario.description = els.scenarioDescription.value.trim();
    scenario.promptCode = els.activePrompt.value || state.promptCode || scenario.promptCode;
    scenario.schemaCode = els.activeSchema.value || state.schemaCode || scenario.schemaCode;
    scenario.toolProfile = scenario.toolProfile || "none";
    if (!scenario.promptCode) return setMessage("请先新增一个主提示词并保存", "error");
    try {
        const saved = await postJson("/few-shot/scenarios", scenarioPayload(scenario));
        state.scenarioCode = saved.code;
        await loadAll();
        setMessage("场景已保存", "ok");
    } catch (error) {
        setMessage(`场景保存失败：${error.message}`, "error");
    }
}

async function savePrompt() {
    persistExampleForm();
    const scenario = currentScenario();
    const prompt = currentPrompt();
    if (!scenario || !prompt) return;
    prompt.promptCode = els.promptCode.value.trim();
    prompt.scenarioCode = scenario.code;
    prompt.active = els.promptActive.value === "true";
    prompt.priority = Number(els.priority.value || 0);
    prompt.codeType = els.codeType.value.trim() || "2";
    prompt.templateType = els.templateType.value.trim() || "1";
    prompt.mailType = Number(els.mailType.value || 0);
    prompt.systemPrompt = els.systemPrompt.value;
    prompt.userPrompt = els.userPrompt.value;
    if (!prompt.promptCode) return setMessage("提示词编码不能为空", "error");
    try {
        const saved = await postJson("/few-shot/prompts", prompt);
        state.promptCode = saved.promptCode;
        scenario.promptCode = saved.promptCode;
        await loadAll();
        setMessage("主提示词已保存", "ok");
    } catch (error) {
        setMessage(`主提示词保存失败：${error.message}`, "error");
    }
}

async function saveSchema() {
    const schema = currentSchema();
    const prompt = currentPrompt();
    const scenario = currentScenario();
    if (!schema || !prompt || !scenario) return;
    schema.schemaCode = normalizeCode(els.schemaCode.value);
    schema.promptCode = prompt.promptCode;
    schema.schemaName = els.schemaName.value.trim() || schema.schemaCode;
    schema.active = els.schemaActive.value === "true";
    schema.schemaJson = els.schemaJson.value;
    schema.fieldDescriptionJson = els.fieldDescriptionJson.value;
    schema.emptyValueRule = els.emptyValueRule.value;
    if (!schema.schemaCode) return setMessage("输出结构编码不能为空", "error");
    if (!isJson(schema.schemaJson)) return setMessage("目标 JSON 结构不是合法 JSON", "error");
    if (schema.fieldDescriptionJson.trim() && !isJson(schema.fieldDescriptionJson)) return setMessage("字段说明不是合法 JSON", "error");
    try {
        const saved = await postJson("/few-shot/output-schemas", schema);
        state.schemaCode = saved.schemaCode;
        scenario.schemaCode = saved.schemaCode;
        await loadAll();
        setMessage("输出结构已保存", "ok");
    } catch (error) {
        setMessage(`输出结构保存失败：${error.message}`, "error");
    }
}

function persistExampleForm() {
    const example = currentExample();
    if (!example) return;
    example.id = els.exampleId.value.trim() || `example-${Date.now()}`;
    example.title = els.exampleTitle.value.trim() || example.id;
    example.tags = els.exampleTags.value.split(",").map((tag) => tag.trim()).filter(Boolean);
    example.input = els.exampleInput.value;
    example.expectedOutput = els.exampleExpected.value;
}

function useCurrentExample() {
    persistExampleForm();
    els.runInput.value = currentExample()?.input || "";
}

async function previewPrompt() {
    persistExampleForm();
    const scenario = buildPreviewScenario();
    if (!scenario) return;
    els.runResult.textContent = "正在生成 Prompt 预览...";
    try {
        const preview = await postJson("/few-shot/prompt-preview", {scenario, input: els.runInput.value});
        els.runResult.textContent = `System Prompt\n\n${preview.systemPrompt || ""}\n\nUser Prompt\n\n${preview.userPrompt || ""}`;
    } catch (error) {
        els.runResult.textContent = `预览失败：${error.message}`;
    }
}

async function runTest() {
    persistExampleForm();
    const scenario = currentScenario();
    if (!scenario) return;
    els.runResult.textContent = "正在调用模型...";
    try {
        const result = await postJson("/few-shot/run", {
            scenarioCode: scenario.code,
            promptCode: state.promptCode,
            schemaCode: state.schemaCode,
            input: els.runInput.value
        });
        els.runResult.textContent = result.result || "";
    } catch (error) {
        els.runResult.textContent = `运行失败：${error.message}`;
    }
}

function buildPreviewScenario() {
    const scenario = currentScenario();
    const prompt = currentPrompt();
    const schema = currentSchema();
    if (!scenario) return null;
    return {
        ...scenarioPayload(scenario),
        promptCode: prompt?.promptCode || scenario.promptCode,
        mainPrompt: prompt || null,
        prompts: scenario.prompts || [],
        schemaCode: schema?.schemaCode || scenario.schemaCode,
        outputSchema: schema || null,
        examples: prompt?.examples || []
    };
}

function scenarioPayload(scenario) {
    return {
        code: scenario.code,
        name: scenario.name,
        description: scenario.description || "",
        inputLabel: scenario.inputLabel || "邮件正文",
        systemInstruction: scenario.systemInstruction || "",
        outputContract: scenario.outputContract || "",
        toolProfile: scenario.toolProfile || "none",
        promptCode: scenario.promptCode || state.promptCode,
        mainPrompt: null,
        prompts: [],
        schemaCode: scenario.schemaCode || state.schemaCode,
        outputSchema: null,
        examples: []
    };
}

function currentScenario() {
    return state.scenarios.find((scenario) => scenario.code === state.scenarioCode);
}

function currentPrompt() {
    return (currentScenario()?.prompts || []).find((prompt) => prompt.promptCode === state.promptCode);
}

function currentSchema() {
    return (currentPrompt()?.outputSchemas || []).find((schema) => schema.schemaCode === state.schemaCode);
}

function currentExample() {
    return (currentPrompt()?.examples || [])[state.exampleIndex];
}

function setPromptDisabled(disabled) {
    [els.promptCode, els.promptActive, els.priority, els.codeType, els.templateType, els.mailType, els.systemPrompt, els.userPrompt, $("savePromptButton")]
        .forEach((element) => element.disabled = disabled);
}

function setExampleDisabled(disabled) {
    [els.exampleId, els.exampleTitle, els.exampleTags, els.exampleInput, els.exampleExpected, $("deleteExampleButton"), $("saveExamplesButton")]
        .forEach((element) => element.disabled = disabled);
}

function setSchemaDisabled(disabled) {
    [els.schemaCode, els.schemaName, els.schemaActive, els.schemaJson, els.fieldDescriptionJson, els.emptyValueRule, $("saveSchemaButton")]
        .forEach((element) => element.disabled = disabled);
}

function matchSearch(values, keyword) {
    if (!keyword) return true;
    return values.some((value) => String(value || "").toLowerCase().includes(keyword));
}

async function getJson(url) {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
}

async function postJson(url, payload) {
    const response = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });
    if (!response.ok) {
        let detail = "";
        try { detail = (await response.json()).message || ""; } catch (ignore) {}
        throw new Error(detail || `HTTP ${response.status}`);
    }
    return response.status === 204 ? null : response.json();
}

function setMessage(text, type = "") {
    els.message.textContent = text || "";
    els.message.className = `message ${type}`.trim();
}

function normalizeCode(value) {
    return String(value || "").trim().toLowerCase().replaceAll("_", "-");
}

function isJson(value) {
    try {
        JSON.parse(String(value || "{}"));
        return true;
    } catch (error) {
        return false;
    }
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
</script>
