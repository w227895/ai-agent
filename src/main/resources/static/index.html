<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Few-shot 场景平台</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --panel-soft: #f8fafc;
            --text: #16202f;
            --muted: #647084;
            --line: #d8dee8;
            --line-strong: #c3ccd9;
            --primary: #0f6f74;
            --primary-dark: #0b5559;
            --accent: #a44310;
            --danger: #b42318;
            --ok: #22745f;
            --control: #fbfcfe;
            --shadow: 0 16px 40px rgba(18, 28, 45, 0.08);
            --mono-bg: #101828;
            --mono-text: #e6edf5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: var(--text);
            background:
                    linear-gradient(180deg, #eef4f5 0, rgba(238, 244, 245, 0) 260px),
                    var(--bg);
        }

        header {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .header-inner,
        main {
            width: min(1500px, calc(100% - 32px));
            margin: 0 auto;
        }

        .header-inner {
            min-height: 74px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        h1 {
            margin: 0;
            font-size: 21px;
            line-height: 1.2;
        }

        .subtitle {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .status {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--panel-soft);
            color: var(--primary-dark);
            font-size: 12px;
            font-weight: 700;
            padding: 7px 10px;
            white-space: nowrap;
        }

        main {
            padding: 20px 0 28px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(460px, 600px);
            gap: 16px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-header {
            min-height: 60px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-title {
            margin: 0;
            font-size: 16px;
        }

        .panel-kicker {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .panel-body {
            padding: 18px;
            display: grid;
            gap: 16px;
        }

        .runner {
            min-height: calc(100vh - 118px);
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .runner-body {
            grid-template-rows: auto minmax(300px, 42vh) auto minmax(230px, 1fr);
        }

        .config-body {
            max-height: calc(100vh - 118px);
            overflow: auto;
            padding-bottom: 14px;
        }

        .row {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 12px;
            align-items: center;
        }

        .two-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .section-panel {
            display: grid;
            gap: 14px;
        }

        label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--control);
            color: var(--text);
            font: 14px/1.55 "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            outline: none;
        }

        input,
        select {
            min-height: 38px;
            padding: 0 11px;
        }

        textarea {
            min-height: 96px;
            padding: 12px;
            resize: vertical;
        }

        textarea.mono {
            font-family: Consolas, "Microsoft YaHei", monospace;
            line-height: 1.6;
        }

        textarea.tall {
            min-height: 170px;
        }

        #runInput {
            font-size: 15px;
            background: #fff;
        }

        textarea.prompt-preview {
            min-height: 260px;
            background: var(--mono-bg);
            border-color: #2b3648;
            color: var(--mono-text);
            font-size: 13px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.13);
            background: #fff;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        button {
            min-height: 38px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            cursor: pointer;
            padding: 0 14px;
            font: inherit;
            font-weight: 700;
        }

        button:hover {
            border-color: var(--line-strong);
            background: var(--panel-soft);
        }

        button.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        button.primary:hover {
            background: var(--primary-dark);
        }

        button.danger {
            color: var(--danger);
            border-color: #efc6bf;
        }

        button:disabled {
            opacity: 0.62;
            cursor: wait;
        }

        .result {
            min-height: 220px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 14px;
            overflow: auto;
            white-space: pre-wrap;
            line-height: 1.7;
        }

        .result-shell {
            display: grid;
            gap: 8px;
        }

        .divider {
            height: 1px;
            background: var(--line);
            margin: 4px 0;
        }

        .section-title {
            margin: 0;
            font-size: 14px;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-soft);
        }

        .tab-button {
            border: 0;
            background: transparent;
            min-height: 34px;
            padding: 0 10px;
            color: var(--muted);
        }

        .tab-button.active {
            background: #fff;
            color: var(--primary-dark);
            box-shadow: 0 1px 3px rgba(18, 28, 45, 0.08);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: grid;
            gap: 14px;
        }

        .example-bar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 8px;
            align-items: center;
        }

        .prompt-preview-grid {
            display: grid;
            gap: 10px;
        }

        .note {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.55;
        }

        .message {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
            text-align: right;
        }

        .message.ok {
            color: var(--ok);
        }

        .message.error,
        .error {
            color: var(--accent);
        }

        @media (max-width: 1060px) {
            main {
                grid-template-columns: 1fr;
            }

            .config-body {
                max-height: none;
            }
        }

        @media (max-width: 620px) {
            .header-inner {
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 0;
            }

            .row,
            .two-cols,
            .example-bar,
            .tabs {
                grid-template-columns: 1fr;
            }

            .runner {
                min-height: 720px;
            }

            .message {
                text-align: left;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <div>
            <h1>Few-shot 场景平台</h1>
            <p class="subtitle">邮件识别、场景配置和提示词预览</p>
        </div>
        <div class="status">POST /few-shot/run</div>
    </div>
</header>

<main>
    <section class="panel runner">
        <div class="panel-header">
            <div>
                <h2 class="panel-title">运行调试</h2>
                <p class="panel-kicker">输入邮件正文，按当前场景配置识别。</p>
            </div>
            <div class="message" id="runMessage"></div>
        </div>
        <div class="panel-body runner-body">
            <div class="row">
                <label for="scenarioSelect">场景</label>
                <select id="scenarioSelect"></select>
            </div>
            <textarea class="mono" id="runInput" spellcheck="false"></textarea>
            <div class="actions">
                <button class="primary" id="processButton" type="button">运行场景</button>
                <button id="sampleButton" type="button">填入当前示例</button>
                <button id="clearButton" type="button">清空</button>
            </div>
            <div class="result-shell">
                <h3 class="section-title">识别结果</h3>
                <div class="result" id="result">处理结果会显示在这里。</div>
            </div>
        </div>
    </section>

    <aside class="panel">
        <div class="panel-header">
            <div>
                <h2 class="panel-title">场景编辑</h2>
                <p class="panel-kicker">维护业务指令、输出契约和 few-shot 示例。</p>
            </div>
            <button id="newScenarioButton" type="button">新建场景</button>
        </div>
        <div class="panel-body config-body">
            <div class="tabs" role="tablist" aria-label="场景配置">
                <button class="tab-button active" type="button" data-config-tab="config">配置</button>
                <button class="tab-button" type="button" data-config-tab="prompt">提示词</button>
                <button class="tab-button" type="button" data-config-tab="examples">示例</button>
            </div>

            <section class="tab-panel active" data-config-panel="config">
                <div class="two-cols">
                    <div class="field">
                        <label for="scenarioCode">编码</label>
                        <input id="scenarioCode" autocomplete="off">
                    </div>
                    <div class="field">
                        <label for="scenarioName">名称</label>
                        <input id="scenarioName" autocomplete="off">
                    </div>
                </div>

                <div class="field">
                    <label for="inputLabel">输入标签</label>
                    <input id="inputLabel" autocomplete="off">
                </div>

                <div class="field">
                    <label for="description">说明</label>
                    <textarea id="description"></textarea>
                </div>

                <div class="field">
                    <label for="systemInstruction">业务指令</label>
                    <textarea class="tall" id="systemInstruction"></textarea>
                </div>

                <div class="field">
                    <label for="outputContract">输出契约</label>
                    <textarea class="tall mono" id="outputContract"></textarea>
                </div>
            </section>

            <section class="tab-panel" data-config-panel="prompt">
                <div class="field">
                    <label for="systemPromptPreview">System Prompt</label>
                    <textarea class="mono prompt-preview" id="systemPromptPreview" readonly></textarea>
                </div>
                <div class="field">
                    <label for="userPromptPreview">User Prompt</label>
                    <textarea class="mono prompt-preview" id="userPromptPreview" readonly></textarea>
                </div>
            </section>

            <section class="tab-panel" data-config-panel="examples">
                <div class="example-bar">
                    <select id="exampleSelect"></select>
                    <button id="addExampleButton" type="button">新增示例</button>
                    <button class="danger" id="deleteExampleButton" type="button">删除示例</button>
                </div>

                <div class="two-cols">
                    <div class="field">
                        <label for="exampleId">示例 ID</label>
                        <input id="exampleId" autocomplete="off">
                    </div>
                    <div class="field">
                        <label for="exampleTitle">标题</label>
                        <input id="exampleTitle" autocomplete="off">
                    </div>
                </div>

                <div class="field">
                    <label for="exampleTags">标签</label>
                    <input id="exampleTags" autocomplete="off" placeholder="多个标签用逗号分隔">
                </div>

                <div class="field">
                    <label for="exampleInput">示例输入</label>
                    <textarea class="tall mono" id="exampleInput"></textarea>
                </div>

                <div class="field">
                    <label for="expectedOutput">期望输出</label>
                    <textarea class="tall mono" id="expectedOutput"></textarea>
                </div>
            </section>

            <div class="actions">
                <button class="primary" id="saveScenarioButton" type="button">保存到 MySQL</button>
                <button id="reloadButton" type="button">重新加载</button>
            </div>
            <div class="message" id="editMessage"></div>
            <div class="note">保存会写入当前场景及所有示例。删除示例后点击保存，MySQL 中对应示例也会被移除。</div>
        </div>
    </aside>
</main>

<script>
    let scenarios = [];
    let currentScenario = null;
    let currentExampleIndex = 0;

    const scenarioSelect = document.querySelector("#scenarioSelect");
    const runInput = document.querySelector("#runInput");
    const result = document.querySelector("#result");
    const processButton = document.querySelector("#processButton");
    const sampleButton = document.querySelector("#sampleButton");
    const clearButton = document.querySelector("#clearButton");
    const runMessage = document.querySelector("#runMessage");

    const newScenarioButton = document.querySelector("#newScenarioButton");
    const saveScenarioButton = document.querySelector("#saveScenarioButton");
    const reloadButton = document.querySelector("#reloadButton");
    const editMessage = document.querySelector("#editMessage");

    const scenarioCode = document.querySelector("#scenarioCode");
    const scenarioName = document.querySelector("#scenarioName");
    const inputLabel = document.querySelector("#inputLabel");
    const description = document.querySelector("#description");
    const systemInstruction = document.querySelector("#systemInstruction");
    const outputContract = document.querySelector("#outputContract");
    const systemPromptPreview = document.querySelector("#systemPromptPreview");
    const userPromptPreview = document.querySelector("#userPromptPreview");

    const exampleSelect = document.querySelector("#exampleSelect");
    const addExampleButton = document.querySelector("#addExampleButton");
    const deleteExampleButton = document.querySelector("#deleteExampleButton");
    const exampleId = document.querySelector("#exampleId");
    const exampleTitle = document.querySelector("#exampleTitle");
    const exampleTags = document.querySelector("#exampleTags");
    const exampleInput = document.querySelector("#exampleInput");
    const expectedOutput = document.querySelector("#expectedOutput");
    const tabButtons = [...document.querySelectorAll("[data-config-tab]")];
    const tabPanels = [...document.querySelectorAll("[data-config-panel]")];

    loadScenarios();

    tabButtons.forEach((button) => {
        button.addEventListener("click", () => setConfigTab(button.dataset.configTab));
    });

    scenarioSelect.addEventListener("change", () => {
        persistFormToCurrent();
        currentScenario = cloneScenario(scenarios.find((scenario) => scenario.code === scenarioSelect.value));
        currentExampleIndex = 0;
        fillForm();
        fillSelectedExampleToRunInput();
        clearMessages();
    });

    exampleSelect.addEventListener("change", () => {
        const nextExampleIndex = Number(exampleSelect.value || 0);
        persistExampleForm();
        currentExampleIndex = nextExampleIndex;
        fillExampleForm();
    });

    [
        scenarioCode,
        scenarioName,
        inputLabel,
        description,
        systemInstruction,
        outputContract,
        exampleId,
        exampleTitle,
        exampleTags,
        exampleInput,
        expectedOutput
    ].forEach((element) => element.addEventListener("input", () => setEditMessage("有未保存修改。")));

    [
        scenarioCode,
        scenarioName,
        inputLabel,
        description,
        systemInstruction,
        outputContract,
        exampleId,
        exampleTitle,
        exampleTags,
        exampleInput,
        expectedOutput,
        runInput
    ].forEach((element) => element.addEventListener("input", updatePromptPreview));

    sampleButton.addEventListener("click", () => {
        persistExampleForm();
        fillSelectedExampleToRunInput();
        runInput.focus();
    });

    clearButton.addEventListener("click", () => {
        runInput.value = "";
        result.textContent = "处理结果会显示在这里。";
        updatePromptPreview();
        runInput.focus();
    });

    processButton.addEventListener("click", async () => {
        const content = runInput.value.trim();
        if (!content) {
            runInput.focus();
            result.innerHTML = "<span class=\"error\">请先输入要处理的内容。</span>";
            return;
        }

        processButton.disabled = true;
        processButton.textContent = "运行中";
        runMessage.textContent = "";
        result.textContent = "AI 正在按场景指令和 few-shot 示例处理...";

        try {
            const response = await fetch("/few-shot/run", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    scenarioCode: scenarioSelect.value,
                    input: content
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            result.textContent = data.result || "没有返回处理结果。";
            runMessage.textContent = "运行完成";
        } catch (error) {
            result.innerHTML = `<span class="error">请求失败：${escapeHtml(error.message)}</span>`;
        } finally {
            processButton.disabled = false;
            processButton.textContent = "运行场景";
        }
    });

    newScenarioButton.addEventListener("click", () => {
        persistFormToCurrent();
        const code = `new-scenario-${Date.now()}`;
        currentScenario = {
            code,
            name: "新场景",
            description: "",
            inputLabel: "输入内容",
            systemInstruction: "",
            outputContract: "",
            toolProfile: "none",
            examples: []
        };
        scenarios.push(currentScenario);
        currentExampleIndex = 0;
        renderScenarioOptions(code);
        fillForm();
        runInput.value = "";
        updatePromptPreview();
        setEditMessage("新场景已创建，编辑后保存。");
    });

    addExampleButton.addEventListener("click", () => {
        ensureScenario();
        persistExampleForm();
        currentScenario.examples.push({
            id: `example-${Date.now()}`,
            title: "新示例",
            input: "",
            expectedOutput: "",
            tags: []
        });
        currentExampleIndex = currentScenario.examples.length - 1;
        renderExampleOptions();
        fillExampleForm();
        setEditMessage("新示例已添加，编辑后保存。");
    });

    deleteExampleButton.addEventListener("click", () => {
        ensureScenario();
        if (!currentScenario.examples.length) {
            return;
        }
        currentScenario.examples.splice(currentExampleIndex, 1);
        currentExampleIndex = Math.max(0, currentExampleIndex - 1);
        renderExampleOptions();
        fillExampleForm();
        setEditMessage("示例已删除，保存后生效。");
    });

    saveScenarioButton.addEventListener("click", async () => {
        persistFormToCurrent();
        if (!currentScenario.code || !currentScenario.name) {
            setEditMessage("编码和名称不能为空。", true);
            return;
        }

        saveScenarioButton.disabled = true;
        saveScenarioButton.textContent = "保存中";
        try {
            const response = await fetch("/few-shot/scenarios", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(currentScenario)
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const saved = await response.json();
            const index = scenarios.findIndex((scenario) => scenario.code === saved.code);
            if (index >= 0) {
                scenarios[index] = saved;
            } else {
                scenarios.push(saved);
            }
            currentScenario = cloneScenario(saved);
            renderScenarioOptions(saved.code);
            fillForm();
            setEditMessage("已保存到 MySQL。", false, true);
        } catch (error) {
            setEditMessage(`保存失败：${error.message}`, true);
        } finally {
            saveScenarioButton.disabled = false;
            saveScenarioButton.textContent = "保存到 MySQL";
        }
    });

    reloadButton.addEventListener("click", loadScenarios);

    async function loadScenarios() {
        scenarioSelect.innerHTML = "<option>加载中...</option>";
        processButton.disabled = true;
        try {
            const response = await fetch("/few-shot/scenarios");
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            scenarios = await response.json();
            currentScenario = cloneScenario(scenarios[0]);
            currentExampleIndex = 0;
            renderScenarioOptions(currentScenario?.code);
            fillForm();
            fillSelectedExampleToRunInput();
            setEditMessage("配置已加载。", false, true);
        } catch (error) {
            scenarioSelect.innerHTML = "<option>加载失败</option>";
            setEditMessage(`场景加载失败：${error.message}`, true);
        } finally {
            processButton.disabled = false;
        }
    }

    function renderScenarioOptions(selectedCode) {
        scenarioSelect.innerHTML = scenarios
            .map((scenario) => `<option value="${escapeHtml(scenario.code)}">${escapeHtml(scenario.name || scenario.code)}</option>`)
            .join("");
        if (selectedCode) {
            scenarioSelect.value = selectedCode;
        }
    }

    function fillForm() {
        if (!currentScenario) {
            setFormDisabled(true);
            return;
        }
        setFormDisabled(false);
        scenarioCode.value = currentScenario.code || "";
        scenarioName.value = currentScenario.name || "";
        inputLabel.value = currentScenario.inputLabel || "输入内容";
        description.value = currentScenario.description || "";
        systemInstruction.value = currentScenario.systemInstruction || "";
        outputContract.value = currentScenario.outputContract || "";
        renderExampleOptions();
        fillExampleForm();
        updatePromptPreview();
    }

    function fillExampleForm() {
        const example = currentScenario?.examples?.[currentExampleIndex];
        const disabled = !example;
        [exampleId, exampleTitle, exampleTags, exampleInput, expectedOutput, deleteExampleButton].forEach((element) => {
            element.disabled = disabled;
        });
        if (!example) {
            exampleId.value = "";
            exampleTitle.value = "";
            exampleTags.value = "";
            exampleInput.value = "";
            expectedOutput.value = "";
            updatePromptPreview();
            return;
        }
        exampleSelect.value = String(currentExampleIndex);
        exampleId.value = example.id || "";
        exampleTitle.value = example.title || "";
        exampleTags.value = (example.tags || []).join(", ");
        exampleInput.value = example.input || "";
        expectedOutput.value = example.expectedOutput || "";
        updatePromptPreview();
    }

    function renderExampleOptions() {
        const examples = currentScenario?.examples || [];
        exampleSelect.innerHTML = examples
            .map((example, index) => `<option value="${index}">${index + 1}. ${escapeHtml(example.title || example.id || "未命名示例")}</option>`)
            .join("");
        exampleSelect.disabled = examples.length === 0;
        deleteExampleButton.disabled = examples.length === 0;
        if (currentExampleIndex >= examples.length) {
            currentExampleIndex = Math.max(0, examples.length - 1);
        }
        if (examples.length) {
            exampleSelect.value = String(currentExampleIndex);
        }
    }

    function persistFormToCurrent() {
        if (!currentScenario) {
            return;
        }
        persistExampleForm();
        currentScenario.code = normalizeCode(scenarioCode.value);
        currentScenario.name = scenarioName.value.trim();
        currentScenario.inputLabel = inputLabel.value.trim() || "输入内容";
        currentScenario.toolProfile = "none";
        currentScenario.description = description.value.trim();
        currentScenario.systemInstruction = systemInstruction.value.trim();
        currentScenario.outputContract = outputContract.value.trim();
    }

    function persistExampleForm() {
        const example = currentScenario?.examples?.[currentExampleIndex];
        if (!example) {
            return;
        }
        example.id = exampleId.value.trim() || `example-${Date.now()}`;
        example.title = exampleTitle.value.trim() || example.id;
        example.input = exampleInput.value.trim();
        example.expectedOutput = expectedOutput.value.trim();
        example.tags = exampleTags.value
            .split(",")
            .map((tag) => tag.trim())
            .filter(Boolean);
        renderExampleOptions();
    }

    function fillSelectedExampleToRunInput() {
        const example = currentScenario?.examples?.[currentExampleIndex] || currentScenario?.examples?.[0];
        runInput.value = example?.input || "";
        updatePromptPreview();
    }

    function ensureScenario() {
        if (!currentScenario) {
            currentScenario = {
                code: `new-scenario-${Date.now()}`,
                name: "新场景",
                description: "",
                inputLabel: "输入内容",
                systemInstruction: "",
                outputContract: "",
                toolProfile: "none",
                examples: []
            };
        }
        if (!currentScenario.examples) {
            currentScenario.examples = [];
        }
    }

    function setFormDisabled(disabled) {
        [
            scenarioCode,
            scenarioName,
            inputLabel,
            description,
            systemInstruction,
            outputContract,
            systemPromptPreview,
            userPromptPreview,
            exampleSelect,
            addExampleButton,
            saveScenarioButton
        ].forEach((element) => {
            element.disabled = disabled;
        });
    }

    function setEditMessage(message, isError = false, isOk = false) {
        editMessage.textContent = message;
        editMessage.className = `message${isError ? " error" : ""}${isOk ? " ok" : ""}`;
    }

    function setConfigTab(tabName) {
        tabButtons.forEach((button) => {
            button.classList.toggle("active", button.dataset.configTab === tabName);
        });
        tabPanels.forEach((panel) => {
            panel.classList.toggle("active", panel.dataset.configPanel === tabName);
        });
    }

    function clearMessages() {
        runMessage.textContent = "";
        editMessage.textContent = "";
        editMessage.className = "message";
    }

    function cloneScenario(scenario) {
        return scenario ? JSON.parse(JSON.stringify(scenario)) : null;
    }

    function normalizeCode(value) {
        return String(value || "").trim().toLowerCase().replaceAll("_", "-");
    }

    function updatePromptPreview() {
        if (!currentScenario) {
            systemPromptPreview.value = "";
            userPromptPreview.value = "";
            return;
        }
        persistFormToCurrent();
        systemPromptPreview.value = buildSystemPrompt(currentScenario);
        userPromptPreview.value = buildUserPrompt(currentScenario, runInput.value.trim());
    }

    function buildSystemPrompt(scenario) {
        return `你是一个可复用的 few-shot 任务执行器。你会收到一个业务场景配置、输出契约和若干示例。
请优先遵守当前业务场景配置，其次参考示例中的表达方式和边界条件。
不要把示例中的具体姓名、订单号、日期、票号等实体套用到新输入里。

场景编码：${scenario.code || ""}
场景名称：${scenario.name || ""}
场景说明：${scenario.description || ""}

业务指令：
${scenario.systemInstruction || ""}

输出契约：
${scenario.outputContract || ""}

Few-shot 示例：
${renderExamples(scenario.examples || [])}`;
    }

    function buildUserPrompt(scenario, input) {
        return `请按当前 few-shot 场景配置处理下面输入。

${scenario.inputLabel || "输入内容"}：
${input || ""}`;
    }

    function renderExamples(examples) {
        if (!examples.length) {
            return "无。";
        }
        return examples.map((example, index) => `示例 ${index + 1}：${example.title || ""}
输入：
${example.input || ""}
期望输出/处理方式：
${example.expectedOutput || ""}`).join("\n\n");
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
</body>
</html>
