<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>大模型配置平台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f4f6fb;
            color: #1f2937;
        }
        button, input, select, textarea { font: inherit; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            flex: 0 0 220px;
            background: #111827;
            color: #fff;
            padding: 24px 16px;
        }
        .logo { font-size: 18px; font-weight: 700; margin-bottom: 32px; }
        .menu-item {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-weight: 600;
        }
        .menu-item.active { background: #2563eb; color: #fff; }
        .main { flex: 1; min-width: 0; padding: 24px; }
        .page-header {
            background: #fff;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, .05);
        }
        .top-line { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        .page-header h1 { margin: 0 0 8px; font-size: 24px; }
        .page-header p { margin: 0; color: #64748b; }
        .message {
            min-height: 30px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border-radius: 999px;
            color: #475569;
            background: #f1f5f9;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        .message:empty { display: none; }
        .message.ok { color: #15803d; background: #dcfce7; }
        .message.error { color: #b91c1c; background: #fee2e2; }
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 10px 18px;
            border-radius: 999px;
            background: #fff;
            color: #475569;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            font-weight: 600;
        }
        .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, .05);
            margin-bottom: 20px;
            min-width: 0;
        }
        .card h2 { margin: 0 0 16px; font-size: 20px; }
        .search-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #475569;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
            color: #111827;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        input[disabled], select[disabled], textarea[disabled] {
            background: #f8fafc;
            color: #64748b;
        }
        textarea { resize: vertical; min-height: 120px; }
        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        button:disabled { opacity: .55; cursor: not-allowed; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-default { background: #f1f5f9; color: #334155; }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .btn-link { background: transparent; color: #2563eb; padding: 4px 6px; }
        .btn-link.danger { color: #dc2626; }
        .table-wrap { width: 100%; overflow: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            text-align: left;
            background: #f8fafc;
            color: #475569;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
        tr:hover td { background: #f9fafb; }
        .code-cell {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
            font-family: Consolas, "Microsoft YaHei", monospace;
        }
        .prompt-text {
            max-width: 320px;
            max-height: 64px;
            overflow: hidden;
            color: #64748b;
            line-height: 1.5;
        }
        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        .tag-green { background: #dcfce7; color: #15803d; }
        .tag-red { background: #fee2e2; color: #b91c1c; }
        .tag-blue { background: #dbeafe; color: #1d4ed8; }
        .tag-gray { background: #f1f5f9; color: #475569; }
        .type-value { color: #64748b; font-size: 12px; margin-top: 3px; }
        .pager {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-top: 14px;
            color: #64748b;
        }
        .pager select { width: auto; min-width: 108px; padding: 8px 10px; }
        .test-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field-block { margin-bottom: 16px; }
        .result-box {
            background: #0f172a;
            color: #dbeafe;
            padding: 16px;
            border-radius: 10px;
            min-height: 360px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow: auto;
        }
        .drawer-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .45);
            display: none;
            justify-content: flex-end;
            z-index: 20;
        }
        .drawer {
            width: min(760px, 100vw);
            height: 100%;
            background: #fff;
            padding: 24px;
            overflow-y: auto;
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .drawer-header h2 { margin: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field-full { grid-column: 1 / 3; }
        .drawer-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #e5e7eb;
        }
        .mono { font-family: Consolas, "Microsoft YaHei", monospace; }
        .hidden { display: none; }
        @media (max-width: 1200px) {
            .layout { display: block; }
            .sidebar { width: auto; }
            .search-grid, .test-layout, .form-grid { grid-template-columns: 1fr; }
            .field-full { grid-column: auto; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="logo">大模型平台</div>
        <div class="menu-item active" data-page="scenes">场景管理</div>
        <div class="menu-item" data-page="prompts">提示词管理</div>
        <div class="menu-item" data-page="outputSchemas">输出结构管理</div>
        <div class="menu-item" data-page="fewShots">Few-shot管理</div>
        <div class="menu-item" data-page="test">提示词测试</div>
    </aside>

    <main class="main">
        <div class="page-header">
            <div class="top-line">
                <div>
                    <h1 id="pageTitle">场景管理</h1>
                    <p id="pageSubtitle">维护航变邮件识别、航变短信识别、售后邮件识别三大业务场景。</p>
                </div>
                <div class="message" id="message"></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-page="scenes">场景管理</div>
            <div class="tab" data-page="prompts">提示词管理</div>
            <div class="tab" data-page="outputSchemas">输出结构管理</div>
            <div class="tab" data-page="fewShots">Few-shot管理</div>
            <div class="tab" data-page="test">提示词测试</div>
        </div>

        <section id="page-scenes">
            <div class="card">
                <div class="search-grid">
                    <div>
                        <label>场景搜索</label>
                        <input id="sceneKeyword" placeholder="场景编码、名称、类型、说明">
                    </div>
                    <div></div>
                    <div></div>
                    <div class="btn-row" style="align-self:end;">
                        <button class="btn-primary" type="button" id="sceneSearchButton">查询</button>
                        <button class="btn-default" type="button" id="sceneResetButton">重置</button>
                        <button class="btn-primary" type="button" id="newSceneButton">新增场景</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>场景</th>
                            <th>状态</th>
                            <th>说明</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="sceneRows"></tbody>
                    </table>
                </div>
                <div class="pager">
                    <span id="scenePageInfo">-</span>
                    <div class="btn-row">
                        <button class="btn-default" type="button" id="scenePrevButton">上一页</button>
                        <button class="btn-default" type="button" id="sceneNextButton">下一页</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-prompts" class="hidden">
            <div class="card">
                <div class="search-grid">
                    <div>
                        <label>提示词搜索</label>
                        <input id="promptKeyword" placeholder="代码、提示词、场景">
                    </div>
                    <div>
                        <label>场景</label>
                        <select id="promptSceneFilter"></select>
                    </div>
                    <div>
                        <label>启用状态</label>
                        <select id="promptActiveFilter">
                            <option value="">全部</option>
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                    <div class="btn-row" style="align-self:end;">
                        <button class="btn-primary" type="button" id="promptSearchButton">查询</button>
                        <button class="btn-default" type="button" id="promptResetButton">重置</button>
                        <button class="btn-primary" type="button" id="newPromptButton">新增配置</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>代码</th>
                            <th>场景</th>
                            <th>代码类型</th>
                            <th>模板类型</th>
                            <th>邮件类型</th>
                            <th>输出结构</th>
                            <th>优先级</th>
                            <th>状态</th>
                            <th>用户提示词</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="promptRows"></tbody>
                    </table>
                </div>
                <div class="pager">
                    <span id="promptPageInfo">-</span>
                    <div class="btn-row">
                        <button class="btn-default" type="button" id="promptPrevButton">上一页</button>
                        <select id="promptPageSelect"></select>
                        <button class="btn-default" type="button" id="promptNextButton">下一页</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-outputSchemas" class="hidden">
            <div class="card">
                <div class="search-grid">
                    <div>
                        <label>结构搜索</label>
                        <input id="outputSchemaKeyword" placeholder="编码、名称、说明、结构内容">
                    </div>
                    <div>
                        <label>场景</label>
                        <select id="outputSchemaSceneFilter"></select>
                    </div>
                    <div>
                        <label>启用状态</label>
                        <select id="outputSchemaActiveFilter">
                            <option value="">全部</option>
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                    <div class="btn-row" style="align-self:end;">
                        <button class="btn-primary" type="button" id="outputSchemaSearchButton">查询</button>
                        <button class="btn-default" type="button" id="outputSchemaResetButton">重置</button>
                        <button class="btn-primary" type="button" id="newOutputSchemaButton">新增结构</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>结构</th>
                            <th>场景</th>
                            <th>状态</th>
                            <th>说明</th>
                            <th>结构内容</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="outputSchemaRows"></tbody>
                    </table>
                </div>
                <div class="pager">
                    <span id="outputSchemaPageInfo">-</span>
                    <div class="btn-row">
                        <button class="btn-default" type="button" id="outputSchemaPrevButton">上一页</button>
                        <button class="btn-default" type="button" id="outputSchemaNextButton">下一页</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-fewShots" class="hidden">
            <div class="card">
                <div class="search-grid">
                    <div>
                        <label>Few-shot 搜索</label>
                        <input id="fewShotKeyword" placeholder="标题、内容、提示词代码">
                    </div>
                    <div>
                        <label>提示词</label>
                        <select id="fewShotPromptFilter"></select>
                    </div>
                    <div>
                        <label>启用状态</label>
                        <select id="fewShotActiveFilter">
                            <option value="">全部</option>
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                    <div class="btn-row" style="align-self:end;">
                        <button class="btn-primary" type="button" id="fewShotSearchButton">查询</button>
                        <button class="btn-default" type="button" id="fewShotResetButton">重置</button>
                        <button class="btn-primary" type="button" id="newFewShotButton">新增 Few-shot</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>提示词</th>
                            <th>标题</th>
                            <th>排序</th>
                            <th>状态</th>
                            <th>内容</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="fewShotRows"></tbody>
                    </table>
                </div>
                <div class="pager">
                    <span id="fewShotPageInfo">-</span>
                    <div class="btn-row">
                        <button class="btn-default" type="button" id="fewShotPrevButton">上一页</button>
                        <button class="btn-default" type="button" id="fewShotNextButton">下一页</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-test" class="hidden">
            <div class="test-layout">
                <div class="card">
                    <h2>测试入参</h2>
                    <div class="field-block">
                        <label>选择提示词</label>
                        <select id="testPrompt"></select>
                    </div>
                    <div class="field-block">
                        <label>发件人</label>
                        <input id="sender" placeholder="可选，不选择提示词时按邮箱自动匹配">
                    </div>
                    <div class="field-block">
                        <label>邮件内容</label>
                        <textarea class="mono" id="emailContent" style="min-height:260px;"></textarea>
                    </div>
                    <div class="field-block">
                        <label>补充变量，可选</label>
                        <textarea class="mono" id="extraVariables" style="min-height:100px;" placeholder='{"orderId":"32483642594336"}'></textarea>
                    </div>
                    <div class="btn-row">
                        <button class="btn-primary" type="button" id="runTestButton">执行测试</button>
                        <button class="btn-default" type="button" id="sampleButton">填入样例</button>
                        <button class="btn-default" type="button" id="clearButton">清空</button>
                    </div>
                </div>

                <div class="card">
                    <h2>测试结果</h2>
                    <div class="btn-row" style="margin-bottom:16px;">
                        <button class="btn-primary" type="button" data-result-tab="result">结果</button>
                        <button class="btn-default" type="button" data-result-tab="prompt">最终 Prompt</button>
                        <span class="tag tag-gray" id="testMeta">未执行</span>
                    </div>
                    <div class="result-box" id="testResult"></div>
                    <div class="result-box hidden" id="finalPrompt"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="drawer-mask" id="sceneDrawerMask">
    <form class="drawer" id="sceneForm">
        <div class="drawer-header">
            <h2 id="sceneDrawerTitle">编辑场景</h2>
            <button class="btn-default" type="button" data-close-scene>关闭</button>
        </div>
        <div class="form-grid">
            <div>
                <label>ID</label>
                <input id="sceneId" disabled>
            </div>
            <div>
                <label>场景编码 scene_code</label>
                <input id="sceneCode" required maxlength="100">
            </div>
            <div>
                <label>场景名称 scene_name</label>
                <input id="sceneName" required maxlength="100">
            </div>
            <div>
                <label>是否启用</label>
                <select id="sceneActive">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div class="field-full">
                <label>说明 description</label>
                <textarea id="sceneDescription" maxlength="500"></textarea>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="btn-danger" type="button" id="deleteSceneButton">删除</button>
            <button class="btn-default" type="button" id="toggleSceneButton">启停</button>
            <button class="btn-default" type="button" data-close-scene>取消</button>
            <button class="btn-primary" type="submit" id="saveSceneButton">保存</button>
        </div>
    </form>
</div>

<div class="drawer-mask" id="promptDrawerMask">
    <form class="drawer" id="promptForm">
        <div class="drawer-header">
            <h2 id="promptDrawerTitle">编辑提示词</h2>
            <button class="btn-default" type="button" data-close-prompt>关闭</button>
        </div>
        <div class="form-grid">
            <div>
                <label>ID</label>
                <input id="promptId" disabled>
            </div>
            <div>
                <label>代码 prompt_code</label>
                <input id="promptCode" required maxlength="500">
            </div>
            <div class="field-full">
                <label>场景</label>
                <select id="promptScene" required></select>
            </div>
            <div class="field-full">
                <label>输出结构 output_schema</label>
                <select id="promptOutputSchema"></select>
            </div>
            <div>
                <label>代码类型 code_type</label>
                <select id="promptCodeType" required></select>
            </div>
            <div>
                <label>模板类型 template_type</label>
                <select id="promptTemplateType" required></select>
            </div>
            <div>
                <label>邮件类型 mail_type</label>
                <select id="promptMailType" required></select>
            </div>
            <div>
                <label>优先级 priority</label>
                <input id="priority" type="number" step="1">
            </div>
            <div>
                <label>是否启用 is_active</label>
                <select id="promptActive">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div class="field-full">
                <label>系统提示词 system_prompt</label>
                <textarea class="mono" id="systemPrompt" maxlength="8000" style="min-height:180px;"></textarea>
            </div>
            <div class="field-full">
                <label>用户提示词 user_prompt</label>
                <textarea class="mono" id="userPrompt" maxlength="2048" style="min-height:150px;"></textarea>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="btn-danger" type="button" id="deletePromptButton">删除</button>
            <button class="btn-default" type="button" id="togglePromptButton">启停</button>
            <button class="btn-default" type="button" data-close-prompt>取消</button>
            <button class="btn-primary" type="submit" id="savePromptButton">保存</button>
        </div>
    </form>
</div>

<div class="drawer-mask" id="outputSchemaDrawerMask">
    <form class="drawer" id="outputSchemaForm">
        <div class="drawer-header">
            <h2 id="outputSchemaDrawerTitle">编辑输出结构</h2>
            <button class="btn-default" type="button" data-close-output-schema>关闭</button>
        </div>
        <div class="form-grid">
            <div>
                <label>ID</label>
                <input id="outputSchemaId" disabled>
            </div>
            <div>
                <label>结构编码 schema_code</label>
                <input id="outputSchemaCode" required maxlength="100">
            </div>
            <div>
                <label>结构名称 schema_name</label>
                <input id="outputSchemaName" required maxlength="100">
            </div>
            <div>
                <label>是否启用 is_active</label>
                <select id="outputSchemaActive">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div class="field-full">
                <label>场景</label>
                <select id="outputSchemaScene"></select>
            </div>
            <div class="field-full">
                <label>说明 description</label>
                <textarea id="outputSchemaDescription" maxlength="500"></textarea>
            </div>
            <div class="field-full">
                <label>提示词片段 prompt_fragment</label>
                <textarea class="mono" id="outputSchemaPromptFragment" style="min-height:220px;"></textarea>
            </div>
            <div class="field-full">
                <label>结构定义 schema_content</label>
                <textarea class="mono" id="outputSchemaContent" style="min-height:220px;"></textarea>
            </div>

});

});

$("sceneSearchButton").addEventListener("click", () => {
    state.scenePage.keyword = els.sceneKeyword.value.trim();

});

});

    loadPrompts();
});
els.promptActiveFilter.addEventListener("change", () => {

});

bootstrap();

async function bootstrap() {
    await refreshSceneData();
    await refreshOutputSchemaData();
    await loadPromptOptions();
    await loadScenes();
    await loadPrompts();
    await loadOutputSchemas();
    await loadFewShots();
}

async function refreshSceneData() {
    state.dictionaries = await getJson("/api/dictionaries");
    state.activeScenes = await getJson("/api/scenes/active");
    renderSceneControls();
}

async function refreshOutputSchemaData() {
    state.activeOutputSchemas = await getJson("/api/output-schemas/active");
    renderOutputSchemaControls();
}

function renderSceneControls() {
    const sceneOptions = [`<option value="">全部场景</option>`].concat(
        state.dictionaries.scenarios.map((scene) => `<option value="${scene.id}">${escapeHtml(scene.sceneName)}</option>`)
    );
    els.promptSceneFilter.innerHTML = sceneOptions.join("");
    els.outputSchemaSceneFilter.innerHTML = sceneOptions.join("");
    renderPromptDictionaryOptions();
    renderPromptSceneOptions();
    renderOutputSchemaSceneOptions();
}

function renderPromptSceneOptions(selectedId = "") {
    const current = selectedId || els.promptScene.value;
    const options = [`<option value="">请选择场景</option>`].concat(
        state.activeScenes.map((scene) => `<option value="${scene.id}">${escapeHtml(scene.sceneName)}</option>`)
    );
    const currentScene = findSceneById(current);
    if (current && currentScene && !currentScene.active && !state.activeScenes.some((scene) => String(scene.id) === String(current))) {
        options.push(`<option value="${currentScene.id}">${escapeHtml(currentScene.sceneName)}（已禁用）</option>`);
    }
    els.promptScene.innerHTML = options.join("");
    els.promptScene.value = current;
}

function renderOutputSchemaSceneOptions(selectedId = "") {
    const current = selectedId || els.outputSchemaScene.value;
    const options = [`<option value="">不限定场景</option>`].concat(
        state.activeScenes.map((scene) => `<option value="${scene.id}">${escapeHtml(scene.sceneName)}</option>`)
    );
    const currentScene = findSceneById(current);
    if (current && currentScene && !currentScene.active && !state.activeScenes.some((scene) => String(scene.id) === String(current))) {
        options.push(`<option value="${currentScene.id}">${escapeHtml(currentScene.sceneName)}（已禁用）</option>`);
    }
    els.outputSchemaScene.innerHTML = options.join("");
    els.outputSchemaScene.value = current;
}

function renderOutputSchemaControls() {
    renderPromptOutputSchemaOptions();
    renderOutputSchemaSceneOptions();
}

function renderPromptOutputSchemaOptions(selectedId = "") {
    const current = selectedId || els.promptOutputSchema.value;
    const options = [`<option value="">不关联输出结构</option>`].concat(
        state.activeOutputSchemas.map((schema) => {
            const scene = findSceneById(schema.sceneId);
            const sceneName = scene ? ` / ${scene.sceneName}` : "";
            return `<option value="${schema.id}">${escapeHtml(schema.schemaName)}${escapeHtml(sceneName)}</option>`;
        })
    );
    const currentSchema = findOutputSchemaById(current);
    if (current && currentSchema && !currentSchema.active && !state.activeOutputSchemas.some((schema) => String(schema.id) === String(current))) {
        options.push(`<option value="${currentSchema.id}">${escapeHtml(currentSchema.schemaName)}（已禁用）</option>`);
    }
    els.promptOutputSchema.innerHTML = options.join("");
    els.promptOutputSchema.value = current;
}

function renderPromptDictionaryOptions() {
    renderDictionarySelect(els.promptCodeType, state.dictionaries.codeTypes);
    renderDictionarySelect(els.promptTemplateType, state.dictionaries.templateTypes);
    renderDictionarySelect(els.promptMailType, state.dictionaries.mailTypes);
}

function renderDictionarySelect(select, items) {
    const current = select.value;
    select.innerHTML = (items || []).map((item) =>
        `<option value="${escapeHtml(item.value)}">${escapeHtml(item.value)} - ${escapeHtml(item.label)}</option>`
    ).join("");
    select.value = current;
}

function showPage(page) {
    state.page = page;
    document.querySelectorAll("[data-page]").forEach((node) => node.classList.toggle("active", node.dataset.page === page));
    $("page-scenes").classList.toggle("hidden", page !== "scenes");
    $("page-prompts").classList.toggle("hidden", page !== "prompts");
    $("page-outputSchemas").classList.toggle("hidden", page !== "outputSchemas");
    $("page-fewShots").classList.toggle("hidden", page !== "fewShots");
    $("page-test").classList.toggle("hidden", page !== "test");
    const titles = {
        scenes: ["场景管理", "维护航变邮件识别、航变短信识别、售后邮件识别三大业务场景。"],
        prompts: ["提示词管理", "维护 llm_prompt 表配置，场景归类和数字分类字段分开管理。"],
        outputSchemas: ["输出结构管理", "维护多条提示词共用的 JSON 输出结构，测试时自动拼入最终 Prompt。"],
        fewShots: ["Few-shot管理", "维护每条提示词关联的 Few-shot 示例，测试时按排序自动拼入 Prompt。"],
        test: ["提示词测试", "选择提示词和邮件内容，直接调用大模型查看返回结果。"]
    };
    els.pageTitle.textContent = titles[page][0];
    els.pageSubtitle.textContent = titles[page][1];
    if (page === "test") renderTestOptions();
}

async function loadScenes() {
    const page = await getJson(`/api/scenes?page=${state.scenePage.page}&size=${state.scenePage.size}&keyword=${encodeURIComponent(state.scenePage.keyword)}`);
    state.scenes = page.items || [];
    state.scenePage.total = page.total || 0;
    state.scenePage.totalPages = page.totalPages || 1;
    renderSceneRows();
}

function renderSceneRows() {
    if (!state.scenes.length) {
        els.sceneRows.innerHTML = `<tr><td colspan="6">暂无场景</td></tr>`;
    } else {
        els.sceneRows.innerHTML = state.scenes.map((scene) => `
            <tr>
                <td>${scene.id}</td>
                <td><div class="code-cell">${escapeHtml(scene.sceneName)}</div><div class="type-value">${escapeHtml(scene.sceneCode)}</div></td>
                <td><span class="tag ${scene.active ? "tag-green" : "tag-red"}">${scene.active ? "启用" : "禁用"}</span></td>
                <td><div class="prompt-text">${escapeHtml(scene.description)}</div></td>
                <td>${formatTime(scene.updateTime)}</td>
                <td>
                    <button class="btn-link" type="button" data-scene-action="view" data-id="${scene.id}">查看</button>
                    <button class="btn-link" type="button" data-scene-action="edit" data-id="${scene.id}">编辑</button>
                    <button class="btn-link" type="button" data-scene-action="toggle" data-id="${scene.id}">${scene.active ? "禁用" : "启用"}</button>
                    <button class="btn-link danger" type="button" data-scene-action="delete" data-id="${scene.id}">删除</button>
                </td>
            </tr>
        `).join("");
    }
    els.scenePageInfo.textContent = `第 ${state.scenePage.page} / ${state.scenePage.totalPages} 页，共 ${state.scenePage.total} 条`;
    els.scenePrevButton.disabled = state.scenePage.page <= 1;
    els.sceneNextButton.disabled = state.scenePage.page >= state.scenePage.totalPages;
}

async function loadPrompts() {
    const params = new URLSearchParams({
        page: state.promptPage.page,
        size: state.promptPage.size,
        keyword: state.promptPage.keyword
    });
    if (els.promptSceneFilter.value) params.set("sceneId", els.promptSceneFilter.value);
    if (els.promptActiveFilter.value) params.set("active", els.promptActiveFilter.value);
    const page = await getJson(`/api/prompts?${params.toString()}`);
    state.prompts = page.items || [];
    state.promptPage.total = page.total || 0;
    state.promptPage.totalPages = page.totalPages || 1;
    state.promptPage.page = page.page || 1;
    renderPromptRows();
    renderPromptSelectors();
}

async function loadPromptOptions() {
    const page = await getJson("/api/prompts?page=1&size=100&keyword=");
    state.promptOptions = page.items || [];
    renderPromptSelectors();
}

function renderPromptSelectors() {
    renderTestOptions();
    renderFewShotPromptOptions();
}

function renderPromptRows() {
    if (!state.prompts.length) {
        els.promptRows.innerHTML = `<tr><td colspan="12">暂无提示词</td></tr>`;
    } else {
        els.promptRows.innerHTML = state.prompts.map((prompt) => {
            const scene = resolvePromptScene(prompt);
            const outputSchema = findOutputSchemaById(prompt.outputSchemaId);
            return `
                <tr>
                    <td>${prompt.id}</td>
                    <td><div class="code-cell" title="${escapeHtml(prompt.promptCode)}">${escapeHtml(prompt.promptCode)}</div></td>
                    <td>${scene ? `<span class="tag tag-blue">${escapeHtml(scene.sceneName)}</span><div class="type-value">${escapeHtml(scene.sceneCode || "")}</div>` : `<span class="tag tag-gray">未配置场景</span>`}</td>
                    <td>${dictValue("codeTypes", prompt.codeType)}</td>
                    <td>${dictValue("templateTypes", prompt.templateType)}</td>
                    <td>${dictValue("mailTypes", prompt.mailType)}</td>
                    <td>${outputSchema ? `<span class="tag tag-gray">${escapeHtml(outputSchema.schemaName)}</span><div class="type-value">${escapeHtml(outputSchema.schemaCode)}</div>` : `<span class="tag tag-red">未关联</span>`}</td>
                    <td>${prompt.priority ?? 0}</td>
                    <td><span class="tag ${prompt.active ? "tag-green" : "tag-red"}">${prompt.active ? "启用" : "禁用"}</span></td>
                    <td><div class="prompt-text">${escapeHtml(prompt.userPrompt)}</div></td>
                    <td>${formatTime(prompt.updateTime)}</td>
                    <td>
                        <button class="btn-link" type="button" data-prompt-action="view" data-id="${prompt.id}">查看</button>
                        <button class="btn-link" type="button" data-prompt-action="edit" data-id="${prompt.id}">编辑</button>
                        <button class="btn-link" type="button" data-prompt-action="fewShot" data-id="${prompt.id}">Few-shot</button>
                        <button class="btn-link" type="button" data-prompt-action="toggle" data-id="${prompt.id}">${prompt.active ? "禁用" : "启用"}</button>
                        <button class="btn-link danger" type="button" data-prompt-action="delete" data-id="${prompt.id}">删除</button>
                    </td>
                </tr>`;
        }).join("");
    }
    els.promptPageInfo.textContent = `第 ${state.promptPage.page} / ${state.promptPage.totalPages} 页，共 ${state.promptPage.total} 条`;
    renderPromptPageSelect();
    els.promptPrevButton.disabled = state.promptPage.page <= 1;
    els.promptNextButton.disabled = state.promptPage.page >= state.promptPage.totalPages;
}

function renderPromptPageSelect() {
    const totalPages = Math.max(1, Number(state.promptPage.totalPages || 1));
    const currentPage = Math.min(Math.max(1, Number(state.promptPage.page || 1)), totalPages);
    els.promptPageSelect.innerHTML = Array.from({length: totalPages}, (_, index) => {
        const page = index + 1;
        return `<option value="${page}">第 ${page} 页</option>`;
    }).join("");
    els.promptPageSelect.value = String(currentPage);
    els.promptPageSelect.disabled = totalPages <= 1;
}

async function loadOutputSchemas() {
    const params = new URLSearchParams({
        page: state.outputSchemaPage.page,
        size: state.outputSchemaPage.size,
        keyword: state.outputSchemaPage.keyword
    });
    if (els.outputSchemaSceneFilter.value) params.set("sceneId", els.outputSchemaSceneFilter.value);
    if (els.outputSchemaActiveFilter.value) params.set("active", els.outputSchemaActiveFilter.value);
    const page = await getJson(`/api/output-schemas?${params.toString()}`);
    state.outputSchemas = page.items || [];
    state.outputSchemaPage.total = page.total || 0;
    state.outputSchemaPage.totalPages = page.totalPages || 1;
    state.outputSchemaPage.page = page.page || 1;
    renderOutputSchemaRows();
}

function renderOutputSchemaRows() {
    if (!state.outputSchemas.length) {
        els.outputSchemaRows.innerHTML = `<tr><td colspan="8">暂无输出结构</td></tr>`;
    } else {
        els.outputSchemaRows.innerHTML = state.outputSchemas.map((schema) => {
            const scene = findSceneById(schema.sceneId);
            return `
                <tr>
                    <td>${schema.id}</td>

async function loadFewShots() {
    const params = new URLSearchParams({
        page: state.fewShotPage.page,
        size: state.fewShotPage.size,
        keyword: state.fewShotPage.keyword
    });
    if (els.fewShotPromptFilter.value) params.set("promptId", els.fewShotPromptFilter.value);
    if (els.fewShotActiveFilter.value) params.set("active", els.fewShotActiveFilter.value);
    const page = await getJson(`/api/few-shots?${params.toString()}`);
    state.fewShots = page.items || [];
    state.fewShotPage.total = page.total || 0;
    state.fewShotPage.totalPages = page.totalPages || 1;
    state.fewShotPage.page = page.page || 1;
    renderFewShotRows();
}

async function runTest() {
    const promptId = els.testPrompt.value ? Number(els.testPrompt.value) : null;
    const emailContent = appendExtraVariables(els.emailContent.value, els.extraVariables.value);
    if (!emailContent.trim()) return setMessage("邮件内容不能为空", "error");
    els.testResult.textContent = "正在调用模型...";
    els.finalPrompt.textContent = "";
    els.testMeta.textContent = "执行中";
    showResultTab("result");
    try {
        const response = await sendJson("/api/test", "POST", {
            promptId,
            promptCode: "",
            sender: els.sender.value.trim(),
            emailContent
        });
        els.testResult.textContent = response.result || "";
        els.finalPrompt.textContent = response.finalPrompt || "";
        els.testMeta.textContent = `成功 | ${response.elapsedMs || 0}ms | #${response.prompt?.id || "-"}`;
        setMessage("测试完成", "ok");
    } catch (error) {
        els.testResult.textContent = `调用失败：${error.message}`;
        els.testMeta.textContent = "失败";
        setMessage(`测试失败：${error.message}`, "error");
    }
}

function showResultTab(tab) {
    state.resultTab = tab;
    document.querySelectorAll("[data-result-tab]").forEach((button) => {
        const active = button.dataset.resultTab === tab;
        button.className = active ? "btn-primary" : "btn-default";
    });
    els.testResult.classList.toggle("hidden", tab !== "result");
    els.finalPrompt.classList.toggle("hidden", tab !== "prompt");
}

function appendExtraVariables(content, variables) {
    const trimmed = variables.trim();
    if (!trimmed) return content;
    return `${content.trim()}\n\n补充变量：\n${trimmed}`;
}

function clearTest() {
    els.sender.value = "";

    els.extraVariables.value = "";
    els.testResult.textContent = "";
    els.finalPrompt.textContent = "";

}

function changeScenePage(delta) {
    const next = state.scenePage.page + delta;
    if (next < 1 || next > state.scenePage.totalPages) return;
    state.scenePage.page = next;
    loadScenes();
}

function findPromptById(id) {
    if (!id) return null;
    return allKnownPrompts().find((prompt) => String(prompt.id) === String(id)) || null;
}

function findOutputSchemaById(id) {
    if (!id) return null;
    return state.activeOutputSchemas.concat(state.outputSchemas)
        .find((schema) => String(schema.id) === String(id)) || null;
}

function allKnownPrompts() {
    const byId = new Map();
    state.promptOptions.concat(state.prompts).forEach((prompt) => byId.set(String(prompt.id), prompt));
    return Array.from(byId.values());
}

function findSceneById(id) {
    if (!id) return null;
    return (state.dictionaries.scenarios || []).find((scene) => String(scene.id) === String(id)) || null;
}

function findSceneByCode(sceneCode) {
    return (state.dictionaries.scenarios || []).find((scene) => scene.sceneCode === sceneCode) || null;
}

function resolvePromptScene(prompt) {
    return findSceneById(prompt.sceneId) || findSceneByCode(inferSceneCode(prompt));
}

function inferSceneCode(prompt) {
    if (String(prompt.codeType) === "after-sale"
        || (String(prompt.codeType) === "2" && !["1", "2"].includes(String(prompt.templateType)))
        || (String(prompt.codeType) === "2" && ["2", "3", "9", "10"].includes(String(prompt.mailType)))) {
        return "after_sale_email";
    }
    if (["3", "4"].includes(String(prompt.codeType))) {
        return "flight_sms";
    }
    if (["1", "2"].includes(String(prompt.codeType)) && ["1", "2"].includes(String(prompt.templateType))) {
        return "flight_email";
    }
    return "";
}

function dictValue(name, value) {
    const rawValue = String(value ?? "");
    const label = plainDictLabel(name, value);
    return label === rawValue
        ? escapeHtml(rawValue)
        : `<span>${escapeHtml(rawValue)} - ${escapeHtml(label)}</span><div class="type-value">${escapeHtml(rawValue)}</div>`;
}

function plainDictLabel(name, value) {
    const rawValue = String(value ?? "");
    const item = (state.dictionaries[name] || []).find((candidate) => String(candidate.value) === rawValue);
    return item ? item.label : rawValue;
}

function setSelectValue(select, value, label) {
    const rawValue = String(value ?? "");
    if (!Array.from(select.options).some((option) => option.value === rawValue)) {
        select.insertAdjacentHTML("beforeend", `<option value="${escapeHtml(rawValue)}">${escapeHtml(rawValue)} - ${escapeHtml(label || rawValue)}</option>`);
    }
    select.value = rawValue;
}

async function getJson(url) {
    const response = await fetch(url);
    if (!response.ok) throw new Error(await errorMessage(response));
    return response.json();
}

async function sendJson(url, method, payload) {
    const response = await fetch(url, {
        method,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(await errorMessage(response));
    return response.status === 204 ? null : response.json();
}

async function deleteRequest(url) {
    const response = await fetch(url, {method: "DELETE"});
    if (!response.ok) throw new Error(await errorMessage(response));
}

async function errorMessage(response) {
    try {
        const body = await response.json();
        return body.message || `HTTP ${response.status}`;
    } catch (error) {
        return `HTTP ${response.status}`;
    }
}

function setMessage(text, type = "") {
    els.message.textContent = text || "";
    els.message.className = `message ${type}`.trim();
}

function formatTime(value) {
    return value ? String(value).replace("T", " ").slice(0, 19) : "";
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
