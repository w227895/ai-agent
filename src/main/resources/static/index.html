<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>大模型配置平台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f4f6fb;
            color: #1f2937;
        }
        button, input, select, textarea { font: inherit; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            flex: 0 0 220px;
            background: #111827;
            color: #fff;
            padding: 24px 16px;
        }
        .logo { font-size: 18px; font-weight: 700; margin-bottom: 32px; }
        .menu-item {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-weight: 600;
        }
        .menu-item.active { background: #2563eb; color: #fff; }
        .main { flex: 1; min-width: 0; padding: 24px; }
        .page-header {
            background: #fff;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, .05);
        }
        .page-header h1 { margin: 0 0 8px; font-size: 24px; }
        .page-header p { margin: 0; color: #64748b; }
        .top-line {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }
        .message {
            min-height: 30px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border-radius: 999px;
            color: #475569;
            background: #f1f5f9;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        .message:empty { display: none; }
        .message.ok { color: #15803d; background: #dcfce7; }
        .message.error { color: #b91c1c; background: #fee2e2; }
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; }
        .tab {
            padding: 10px 18px;
            border-radius: 999px;
            background: #fff;
            color: #475569;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            font-weight: 600;
        }
        .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, .05);
            margin-bottom: 20px;
            min-width: 0;
        }
        .card h2 { margin: 0 0 16px; font-size: 20px; }
        .search-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #475569;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
            color: #111827;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        textarea { resize: vertical; min-height: 120px; }
        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        button:disabled { opacity: .55; cursor: not-allowed; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-default { background: #f1f5f9; color: #334155; }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .btn-link { background: transparent; color: #2563eb; padding: 4px 6px; }
        .btn-link.danger { color: #dc2626; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            text-align: left;
            background: #f8fafc;
            color: #475569;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
        }
        tr:hover td { background: #f9fafb; }
        tr.selected td { background: #eff6ff; }
        .table-wrap { width: 100%; overflow: auto; }
        .code-cell {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
            font-family: Consolas, "Microsoft YaHei", monospace;
        }
        .prompt-text {
            max-width: 320px;
            max-height: 64px;
            overflow: hidden;
            color: #64748b;
            line-height: 1.5;
        }
        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        .tag-green { background: #dcfce7; color: #15803d; }
        .tag-red { background: #fee2e2; color: #b91c1c; }
        .tag-blue { background: #dbeafe; color: #1d4ed8; }
        .tag-gray { background: #f1f5f9; color: #475569; }
        .pager {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-top: 14px;
            color: #64748b;
        }
        .test-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .field-block { margin-bottom: 16px; }
        .result-box {
            background: #0f172a;
            color: #dbeafe;
            padding: 16px;
            border-radius: 10px;
            min-height: 360px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow: auto;
        }
        .result-tabs { margin-bottom: 16px; }
        .hidden { display: none; }
        .drawer-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .45);
            display: none;
            justify-content: flex-end;
            z-index: 20;
        }
        .drawer {
            width: min(720px, 100vw);
            height: 100%;
            background: #fff;
            padding: 24px;
            overflow-y: auto;
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .drawer-header h2 { margin: 0; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field-full { grid-column: 1 / 3; }
        .drawer-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #e5e7eb;
        }
        .mono { font-family: Consolas, "Microsoft YaHei", monospace; }
        @media (max-width: 1200px) {
            .layout { display: block; }
            .sidebar { width: auto; }
            .search-grid, .test-layout, .form-grid { grid-template-columns: 1fr; }
            .field-full { grid-column: auto; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="logo">大模型平台</div>
        <div class="menu-item active" data-page="list">大模型配置</div>
        <div class="menu-item" data-page="test">提示词测试</div>
    </aside>

    <main class="main">
        <div class="page-header">
            <div class="top-line">
                <div>
                    <h1 id="pageTitle">大模型配置管理</h1>
                    <p id="pageSubtitle">维护 llm_prompt 表配置，支持新增、编辑、启用禁用，并可直接测试邮件解析效果。</p>
                </div>
                <div class="message" id="message"></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-page="list">配置管理</div>
            <div class="tab" data-page="test">提示词测试</div>
        </div>

        <section id="page-list">
            <div class="card">
                <div class="search-grid">
                    <div>
                        <label>提示词代码</label>
                        <input id="keyword" placeholder="例如 @airline.com / MAIL_CHANGE">
                    </div>
                    <div>
                        <label>代码类型</label>
                        <select id="filterCodeType">
                            <option value="">全部</option>
                            <option value="1">供应商</option>
                            <option value="2">邮箱</option>
                            <option value="4">短信</option>
                        </select>
                    </div>
                    <div>
                        <label>模板类型</label>
                        <input id="filterTemplateType" placeholder="例如 1 / flight_change">
                    </div>
                    <div>
                        <label>启用状态</label>
                        <select id="filterActive">
                            <option value="">全部</option>
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn-primary" type="button" id="searchButton">查询</button>
                    <button class="btn-default" type="button" id="resetButton">重置</button>
                    <button class="btn-primary" type="button" id="newPromptButton">新增配置</button>
                </div>
            </div>

            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>代码</th>
                            <th>类型</th>
                            <th>模板类型</th>
                            <th>邮件类型</th>
                            <th>优先级</th>
                            <th>状态</th>
                            <th>用户提示词</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="promptRows"></tbody>
                    </table>
                </div>
                <div class="pager">
                    <span id="pageInfo">-</span>
                    <div class="btn-row">
                        <button class="btn-default" type="button" id="prevPageButton">上一页</button>
                        <button class="btn-default" type="button" id="nextPageButton">下一页</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-test" class="hidden">
            <div class="test-layout">
                <div class="card">
                    <h2>测试入参</h2>
                    <div class="field-block">
                        <label>选择提示词</label>
                        <select id="testPrompt"></select>
                    </div>
                    <div class="field-block">
                        <label>发件人</label>
                        <input id="sender" placeholder="可选，不选择提示词时按邮箱自动匹配">
                    </div>
                    <div class="field-block">
                        <label>邮件内容</label>
                        <textarea class="mono" id="emailContent" style="min-height:260px;"></textarea>
                    </div>
                    <div class="field-block">
                        <label>补充变量，可选</label>
                        <textarea class="mono" id="extraVariables" style="min-height:100px;" placeholder='{"orderId":"32483642594336"}'></textarea>
                    </div>
                    <div class="btn-row">
                        <button class="btn-primary" type="button" id="runTestButton">执行测试</button>
                        <button class="btn-default" type="button" id="sampleButton">填入样例</button>
                        <button class="btn-default" type="button" id="clearButton">清空</button>
                    </div>
                </div>

                <div class="card">
                    <h2>测试结果</h2>
                    <div class="btn-row result-tabs">
                        <button class="btn-primary" type="button" data-result-tab="result">结果</button>
                        <button class="btn-default" type="button" data-result-tab="prompt">最终 Prompt</button>
                        <span class="tag tag-gray" id="testMeta">未执行</span>
                    </div>
                    <div class="result-box" id="testResult"></div>
                    <div class="result-box hidden" id="finalPrompt"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="drawer-mask" id="drawerMask">
    <form class="drawer" id="promptForm">
        <div class="drawer-header">
            <h2 id="drawerTitle">编辑大模型配置</h2>
            <button class="btn-default" type="button" id="closeDrawerButton">关闭</button>
        </div>

        <div class="form-grid">
            <div>
                <label>ID</label>
                <input id="promptId" disabled>
            </div>
            <div>
                <label>代码 prompt_code</label>
                <input id="promptCode" required maxlength="500">
            </div>
            <div>
                <label>代码类型 code_type</label>
                <select id="codeType">
                    <option value="2">邮箱</option>
                    <option value="1">供应商</option>
                    <option value="4">短信</option>
                </select>
            </div>
            <div>
                <label>模板类型 template_type</label>
                <input id="templateType" maxlength="50">
            </div>
            <div>
                <label>邮件类型 mail_type</label>
                <input id="mailType" type="number" step="1">
            </div>
            <div>
                <label>优先级 priority</label>
                <input id="priority" type="number" step="1">
            </div>
            <div>
                <label>是否启用 is_active</label>
                <select id="active">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div>
                <label>更新时间</label>
                <input id="updateTime" disabled>
            </div>
            <div class="field-full">
                <label>系统提示词 system_prompt</label>
                <textarea class="mono" id="systemPrompt" maxlength="8000" style="min-height:180px;"></textarea>
            </div>
            <div class="field-full">
                <label>用户提示词 user_prompt</label>
                <textarea class="mono" id="userPrompt" maxlength="2048" style="min-height:150px;"></textarea>
            </div>
        </div>

        <div class="drawer-footer">
            <button class="btn-danger" type="button" id="deletePromptButton">删除</button>
            <button class="btn-default" type="button" id="toggleActiveButton">启停</button>
            <button class="btn-default" type="button" id="cancelDrawerButton">取消</button>
            <button class="btn-primary" type="submit">保存</button>
        </div>
    </form>
</div>

<script>
const state = {
    page: 1,
    size: 20,
    total: 0,
    totalPages: 1,
    keyword: "",
    prompts: [],
    selectedId: null,
    editingPrompt: null,
    resultTab: "result"
};

const sampleMail = `Dear Agent,

Please be advised that flight MU1234 from PVG to NRT on 20JUN has been changed.

Original departure time: 2026-06-20 10:30
New departure time: 2026-06-20 13:50

Order No: 32483642594336

Best regards,
Airline Support`;

const $ = (id) => document.getElementById(id);
const els = {
    message: $("message"),
    pageTitle: $("pageTitle"),
    pageSubtitle: $("pageSubtitle"),
    keyword: $("keyword"),
    filterCodeType: $("filterCodeType"),
    filterTemplateType: $("filterTemplateType"),
    filterActive: $("filterActive"),
    promptRows: $("promptRows"),
    pageInfo: $("pageInfo"),
    prevPageButton: $("prevPageButton"),
    nextPageButton: $("nextPageButton"),
    drawerMask: $("drawerMask"),
    drawerTitle: $("drawerTitle"),
    promptForm: $("promptForm"),
    promptId: $("promptId"),
    promptCode: $("promptCode"),
    codeType: $("codeType"),
    templateType: $("templateType"),
    mailType: $("mailType"),
    priority: $("priority"),
    active: $("active"),
    updateTime: $("updateTime"),
    systemPrompt: $("systemPrompt"),
    userPrompt: $("userPrompt"),
    deletePromptButton: $("deletePromptButton"),
    toggleActiveButton: $("toggleActiveButton"),
    testPrompt: $("testPrompt"),
    sender: $("sender"),
    emailContent: $("emailContent"),
    extraVariables: $("extraVariables"),
    testResult: $("testResult"),
    finalPrompt: $("finalPrompt"),
    testMeta: $("testMeta")
};

document.querySelectorAll("[data-page]").forEach((node) => {
    node.addEventListener("click", () => showPage(node.dataset.page));
});
document.querySelectorAll("[data-result-tab]").forEach((node) => {
    node.addEventListener("click", () => showResultTab(node.dataset.resultTab));
});
$("searchButton").addEventListener("click", () => {
    state.keyword = els.keyword.value.trim();
    state.page = 1;
    loadPrompts();
});
$("resetButton").addEventListener("click", resetSearch);
$("newPromptButton").addEventListener("click", () => openDrawer(emptyPrompt()));
$("prevPageButton").addEventListener("click", () => changePage(-1));
$("nextPageButton").addEventListener("click", () => changePage(1));
$("closeDrawerButton").addEventListener("click", closeDrawer);
$("cancelDrawerButton").addEventListener("click", closeDrawer);
els.drawerMask.addEventListener("click", (event) => {
    if (event.target === els.drawerMask) closeDrawer();
});
els.promptForm.addEventListener("submit", savePrompt);
els.deletePromptButton.addEventListener("click", deletePrompt);
els.toggleActiveButton.addEventListener("click", toggleActive);
$("runTestButton").addEventListener("click", runTest);
$("sampleButton").addEventListener("click", () => els.emailContent.value = sampleMail);
$("clearButton").addEventListener("click", clearTest);
els.keyword.addEventListener("keydown", (event) => {
    if (event.key === "Enter") $("searchButton").click();
});

els.emailContent.value = sampleMail;
loadPrompts();

function showPage(page) {
    document.querySelectorAll("[data-page]").forEach((node) => {
        node.classList.toggle("active", node.dataset.page === page);
    });
    $("page-list").classList.toggle("hidden", page !== "list");
    $("page-test").classList.toggle("hidden", page !== "test");
    els.pageTitle.textContent = page === "list" ? "大模型配置管理" : "提示词测试";
    els.pageSubtitle.textContent = page === "list"
        ? "维护 llm_prompt 表配置，支持新增、编辑、启用禁用，并可直接测试邮件解析效果。"
        : "选择提示词和邮件内容，直接调用大模型查看返回结果。";
    if (page === "test") renderTestOptions();
}

async function loadPrompts() {
    setMessage("正在加载...");
    try {
        const page = await getJson(`/api/prompts?page=${state.page}&size=${state.size}&keyword=${encodeURIComponent(state.keyword)}`);
        state.prompts = (page.items || []).filter(matchesLocalFilters);
        state.total = page.total || 0;
        state.totalPages = page.totalPages || 1;
        renderRows();
        renderTestOptions();
        setMessage(`已加载 ${state.prompts.length} 条`, "ok");
    } catch (error) {
        setMessage(`加载失败：${error.message}`, "error");
    }
}

function matchesLocalFilters(prompt) {
    if (els.filterCodeType.value && prompt.codeType !== els.filterCodeType.value) return false;
    if (els.filterTemplateType.value.trim() && !String(prompt.templateType || "").includes(els.filterTemplateType.value.trim())) return false;
    if (els.filterActive.value && String(prompt.active) !== els.filterActive.value) return false;
    return true;
}

function renderRows() {
    if (!state.prompts.length) {
        els.promptRows.innerHTML = `<tr><td colspan="10">暂无数据</td></tr>`;
    } else {
        els.promptRows.innerHTML = state.prompts.map((prompt) => `
            <tr class="${prompt.id === state.selectedId ? "selected" : ""}">
                <td>${prompt.id}</td>
                <td><div class="code-cell" title="${escapeHtml(prompt.promptCode)}">${escapeHtml(prompt.promptCode)}</div></td>
                <td>${typeTag(prompt.codeType)}</td>
                <td>${escapeHtml(prompt.templateType)}</td>
                <td>${prompt.mailType ?? 0}</td>
                <td>${prompt.priority ?? 0}</td>
                <td><span class="tag ${prompt.active ? "tag-green" : "tag-red"}">${prompt.active ? "启用" : "禁用"}</span></td>
                <td><div class="prompt-text">${escapeHtml(prompt.userPrompt)}</div></td>
                <td>${formatTime(prompt.updateTime)}</td>
                <td>
                    <button class="btn-link" type="button" data-action="edit" data-id="${prompt.id}">编辑</button>
                    <button class="btn-link" type="button" data-action="toggle" data-id="${prompt.id}">${prompt.active ? "禁用" : "启用"}</button>
                    <button class="btn-link danger" type="button" data-action="delete" data-id="${prompt.id}">删除</button>
                </td>
            </tr>
        `).join("");
    }
    els.promptRows.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => handleRowAction(button.dataset.action, Number(button.dataset.id)));
    });
    els.pageInfo.textContent = `第 ${state.page} / ${state.totalPages} 页，共 ${state.total} 条`;
    els.prevPageButton.disabled = state.page <= 1;
    els.nextPageButton.disabled = state.page >= state.totalPages;
}

function renderTestOptions() {
    const current = els.testPrompt.value;
    els.testPrompt.innerHTML = [`<option value="">按发件人自动匹配</option>`].concat(
        state.prompts.map((prompt) => `<option value="${prompt.id}">#${prompt.id} ${escapeHtml(prompt.promptCode)}</option>`)
    ).join("");
    if (state.prompts.some((prompt) => String(prompt.id) === current)) {
        els.testPrompt.value = current;
    } else if (state.selectedId) {
        els.testPrompt.value = String(state.selectedId);
    }
}

function handleRowAction(action, id) {
    const prompt = state.prompts.find((item) => item.id === id);
    state.selectedId = id;
    if (action === "edit") openDrawer(prompt);
    if (action === "toggle") toggleActive(prompt);
    if (action === "delete") deletePrompt(prompt);
}

function openDrawer(prompt) {
    const data = prompt || emptyPrompt();
    state.editingPrompt = data;
    els.drawerTitle.textContent = data.id == null ? "新增大模型配置" : `编辑大模型配置 #${data.id}`;
    els.promptId.value = data.id == null ? "" : data.id;
    els.promptCode.value = data.promptCode || "";
    els.codeType.value = data.codeType || "2";
    els.templateType.value = data.templateType || "1";
    els.mailType.value = data.mailType ?? 0;
    els.priority.value = data.priority ?? 0;
    els.active.value = String(data.active ?? true);
    els.updateTime.value = formatTime(data.updateTime);
    els.systemPrompt.value = data.systemPrompt || "";
    els.userPrompt.value = data.userPrompt || "";
    els.deletePromptButton.disabled = data.id == null;
    els.toggleActiveButton.disabled = data.id == null;
    els.drawerMask.style.display = "flex";
}

function closeDrawer() {
    els.drawerMask.style.display = "none";
    state.editingPrompt = null;
}

async function savePrompt(event) {
    event.preventDefault();
    const id = Number(els.promptId.value || 0);
    const payload = {
        promptCode: els.promptCode.value.trim(),
        codeType: els.codeType.value.trim() || "2",
        templateType: els.templateType.value.trim() || "1",
        userPrompt: els.userPrompt.value,
        priority: Number(els.priority.value || 0),
        active: els.active.value === "true",
        systemPrompt: els.systemPrompt.value,
        mailType: Number(els.mailType.value || 0)
    };
    if (!payload.promptCode) return setMessage("代码不能为空", "error");
    try {
        const saved = id
            ? await sendJson(`/api/prompts/${id}`, "PUT", payload)
            : await sendJson("/api/prompts", "POST", payload);
        state.selectedId = saved.id;
        closeDrawer();
        await loadPrompts();
        setMessage("保存成功", "ok");
    } catch (error) {
        setMessage(`保存失败：${error.message}`, "error");
    }
}

async function toggleActive(prompt = state.editingPrompt) {
    if (!prompt?.id) return;
    try {
        await sendJson(`/api/prompts/${prompt.id}/status?active=${!prompt.active}`, "POST", {});
        if (state.editingPrompt?.id === prompt.id) closeDrawer();
        await loadPrompts();
        setMessage(prompt.active ? "已禁用" : "已启用", "ok");
    } catch (error) {
        setMessage(`状态更新失败：${error.message}`, "error");
    }
}

async function deletePrompt(prompt = state.editingPrompt) {
    if (!prompt?.id || !confirm(`确认删除 #${prompt.id} ${prompt.promptCode}？`)) return;
    try {
        await deleteRequest(`/api/prompts/${prompt.id}`);
        if (state.editingPrompt?.id === prompt.id) closeDrawer();
        state.selectedId = null;
        await loadPrompts();
        setMessage("删除成功", "ok");
    } catch (error) {
        setMessage(`删除失败：${error.message}`, "error");
    }
}

async function runTest() {
    const promptId = els.testPrompt.value ? Number(els.testPrompt.value) : null;
    const emailContent = appendExtraVariables(els.emailContent.value, els.extraVariables.value);
    if (!emailContent.trim()) return setMessage("邮件内容不能为空", "error");
    els.testResult.textContent = "正在调用模型...";
    els.finalPrompt.textContent = "";
    els.testMeta.textContent = "执行中";
    showResultTab("result");
    try {
        const response = await sendJson("/api/test", "POST", {
            promptId,
            promptCode: "",
            sender: els.sender.value.trim(),
            emailContent
        });
        els.testResult.textContent = response.result || "";
        els.finalPrompt.textContent = response.finalPrompt || "";
        els.testMeta.textContent = `成功 | ${response.elapsedMs || 0}ms | #${response.prompt?.id || "-"}`;
        setMessage("测试完成", "ok");
    } catch (error) {
        els.testResult.textContent = `调用失败：${error.message}`;
        els.testMeta.textContent = "失败";
        setMessage(`测试失败：${error.message}`, "error");
    }
}

function showResultTab(tab) {
    state.resultTab = tab;
    document.querySelectorAll("[data-result-tab]").forEach((button) => {
        const active = button.dataset.resultTab === tab;
        button.className = active ? "btn-primary" : "btn-default";
    });
    els.testResult.classList.toggle("hidden", tab !== "result");
    els.finalPrompt.classList.toggle("hidden", tab !== "prompt");
}

function appendExtraVariables(content, variables) {
    const trimmed = variables.trim();
    if (!trimmed) return content;
    return `${content.trim()}\n\n补充变量：\n${trimmed}`;
}

function clearTest() {
    els.sender.value = "";
    els.emailContent.value = "";
    els.extraVariables.value = "";
    els.testResult.textContent = "";
    els.finalPrompt.textContent = "";
    els.testMeta.textContent = "未执行";
}

function resetSearch() {
    els.keyword.value = "";
    els.filterCodeType.value = "";
    els.filterTemplateType.value = "";
    els.filterActive.value = "";
    state.keyword = "";
    state.page = 1;
    loadPrompts();
}

function changePage(delta) {
    const next = state.page + delta;
    if (next < 1 || next > state.totalPages) return;
    state.page = next;
    loadPrompts();
}

function emptyPrompt() {
    return {
        id: null,
        promptCode: "",
        codeType: "2",
        templateType: "1",
        userPrompt: "解析航班变更邮件并返回结构化JSON数据：\\n\\n当前时间：{current_time}\\n邮件内容：\\n{email_content}\\n\\n请从邮件内容中提取航班变更信息，并映射到指定的JSON结构。只返回纯JSON数据，不要其他内容。",
        priority: 1,
        active: true,
        systemPrompt: "",
        mailType: 0
    };
}

function typeTag(codeType) {
    const label = codeType === "1" ? "供应商" : codeType === "4" ? "短信" : "邮箱";
    return `<span class="tag tag-blue">${label}</span>`;
}

async function getJson(url) {
    const response = await fetch(url);
    if (!response.ok) throw new Error(await errorMessage(response));
    return response.json();
}

async function sendJson(url, method, payload) {
    const response = await fetch(url, {
        method,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(await errorMessage(response));
    return response.status === 204 ? null : response.json();
}

async function deleteRequest(url) {
    const response = await fetch(url, {method: "DELETE"});
    if (!response.ok) throw new Error(await errorMessage(response));
}

async function errorMessage(response) {
    try {
        const body = await response.json();
        return body.message || `HTTP ${response.status}`;
    } catch (error) {
        return `HTTP ${response.status}`;
    }
}

function setMessage(text, type = "") {
    els.message.textContent = text || "";
    els.message.className = `message ${type}`.trim();
}

function formatTime(value) {
    return value ? String(value).replace("T", " ").slice(0, 19) : "";
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
