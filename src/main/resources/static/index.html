<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Few-shot 场景平台</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --panel: #ffffff;
            --text: #162033;
            --muted: #667085;
            --line: #d7dde8;
            --primary: #176b87;
            --primary-dark: #0f5268;
            --accent: #c2410c;
            --soft: #eef6f8;
            --shadow: 0 16px 42px rgba(22, 32, 51, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
        }

        .header-inner,
        main {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
        }

        .header-inner {
            min-height: 76px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            line-height: 1.2;
        }

        .subtitle {
            margin: 5px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .status {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        main {
            padding: 24px 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 20px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .workspace {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: calc(100vh - 124px);
            overflow: hidden;
        }

        .panel-header {
            padding: 18px 18px 14px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            margin: 0;
            font-size: 16px;
        }

        .editor {
            padding: 18px;
            display: grid;
            grid-template-rows: auto minmax(260px, 42vh) auto minmax(220px, 1fr);
            gap: 14px;
            min-height: 0;
        }

        .field-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            align-items: center;
        }

        label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        select {
            width: 100%;
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0 12px;
            color: var(--text);
            background: #fff;
            font: inherit;
            outline: none;
        }

        textarea {
            width: 100%;
            min-height: 260px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            color: var(--text);
            font: 14px/1.65 Consolas, "Microsoft YaHei", monospace;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(23, 107, 135, 0.14);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        button {
            min-height: 40px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            cursor: pointer;
            padding: 0 14px;
            font: inherit;
            font-weight: 700;
        }

        button.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        button.primary:hover {
            background: var(--primary-dark);
        }

        button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        .result {
            min-height: 220px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fbfcfe;
            padding: 14px;
            overflow: auto;
            white-space: pre-wrap;
            line-height: 1.7;
            color: var(--text);
        }

        aside {
            align-self: start;
            padding: 18px;
        }

        .flow {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .step {
            display: grid;
            grid-template-columns: 32px 1fr;
            gap: 10px;
            align-items: start;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft);
        }

        .step-number {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-weight: 800;
        }

        .step-title {
            margin: 0 0 4px;
            font-weight: 800;
            font-size: 14px;
        }

        .step-desc {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .hint {
            margin-top: 18px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.65;
        }

        .error {
            color: var(--accent);
        }

        .meta {
            display: grid;
            gap: 12px;
            margin-top: 14px;
        }

        .meta-block {
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }

        .meta-title {
            margin: 0 0 6px;
            font-size: 13px;
            font-weight: 800;
        }

        .meta-text {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.65;
            white-space: pre-wrap;
        }

        @media (max-width: 920px) {
            .header-inner {
                align-items: flex-start;
                flex-direction: column;
                padding: 14px 0;
            }

            main {
                grid-template-columns: 1fr;
            }

            .workspace {
                min-height: 720px;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <div>
            <h1>Few-shot 场景平台</h1>
            <p class="subtitle">统一管理场景指令、样例和工具链，航变邮件只是第一个内置场景</p>
        </div>
        <div class="status">POST /few-shot/run</div>
    </div>
</header>

<main>
    <section class="panel workspace">
        <div class="panel-header">
            <h2 class="panel-title">场景输入</h2>
        </div>
        <div class="editor">
            <div class="field-row">
                <label for="scenarioSelect">场景</label>
                <select id="scenarioSelect"></select>
            </div>
            <textarea id="emailInput" spellcheck="false"></textarea>
            <div class="actions">
                <button class="primary" id="processButton" type="button">运行场景</button>
                <button id="sampleButton" type="button">填入示例</button>
                <button id="clearButton" type="button">清空</button>
            </div>
            <div class="result" id="result">处理结果会显示在这里。</div>
        </div>
    </section>

    <aside class="panel">
        <h2 class="panel-title">场景配置</h2>
        <div class="meta" id="scenarioMeta"></div>
        <p class="hint">场景由业务指令、输出契约、工具配置和 few-shot 示例组成。后续新增业务时优先新增场景和样例，只有需要真实系统动作时才接入新的工具链。</p>
    </aside>
</main>

<script>
    let scenarios = [];
    let currentScenario = null;

    const scenarioSelect = document.querySelector("#scenarioSelect");
    const emailInput = document.querySelector("#emailInput");
    const result = document.querySelector("#result");
    const processButton = document.querySelector("#processButton");
    const sampleButton = document.querySelector("#sampleButton");
    const clearButton = document.querySelector("#clearButton");
    const scenarioMeta = document.querySelector("#scenarioMeta");

    loadScenarios();

    sampleButton.addEventListener("click", () => {
        fillSelectedExample();
        emailInput.focus();
    });

    scenarioSelect.addEventListener("change", () => {
        currentScenario = scenarios.find((scenario) => scenario.code === scenarioSelect.value);
        renderScenarioMeta();
        fillSelectedExample();
    });

    clearButton.addEventListener("click", () => {
        emailInput.value = "";
        result.textContent = "处理结果会显示在这里。";
        emailInput.focus();
    });

    processButton.addEventListener("click", async () => {
        const emailContent = emailInput.value.trim();
        if (!emailContent) {
            emailInput.focus();
            result.innerHTML = "<span class=\"error\">请先输入要处理的内容。</span>";
            return;
        }

        processButton.disabled = true;
        processButton.textContent = "运行中";
        result.textContent = "AI 正在按场景指令和 few-shot 示例处理...";

        try {
            const response = await fetch("/few-shot/run", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    scenarioCode: scenarioSelect.value,
                    input: emailContent
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            result.textContent = data.result || "没有返回处理结果。";
        } catch (error) {
            result.innerHTML = `<span class="error">请求失败：${error.message}</span>`;
        } finally {
            processButton.disabled = false;
            processButton.textContent = "运行场景";
        }
    });

    async function loadScenarios() {
        scenarioSelect.innerHTML = "<option>加载中...</option>";
        processButton.disabled = true;
        try {
            const response = await fetch("/few-shot/scenarios");
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            scenarios = await response.json();
            scenarioSelect.innerHTML = scenarios
                .map((scenario) => `<option value="${escapeHtml(scenario.code)}">${escapeHtml(scenario.name)}</option>`)
                .join("");
            currentScenario = scenarios[0];
            if (currentScenario) {
                scenarioSelect.value = currentScenario.code;
                fillSelectedExample();
            }
            renderScenarioMeta();
        } catch (error) {
            scenarioSelect.innerHTML = "<option>加载失败</option>";
            scenarioMeta.innerHTML = `<p class="meta-text error">场景加载失败：${escapeHtml(error.message)}</p>`;
        } finally {
            processButton.disabled = false;
        }
    }

    function fillSelectedExample() {
        const example = currentScenario?.examples?.[0];
        emailInput.value = example?.input || "";
    }

    function renderScenarioMeta() {
        if (!currentScenario) {
            scenarioMeta.textContent = "暂无场景。";
            return;
        }

        const examples = currentScenario.examples || [];
        scenarioMeta.innerHTML = `
            <section class="meta-block">
                <p class="meta-title">说明</p>
                <p class="meta-text">${escapeHtml(currentScenario.description || "")}</p>
            </section>
            <section class="meta-block">
                <p class="meta-title">工具配置</p>
                <p class="meta-text">${escapeHtml(currentScenario.toolProfile || "none")}</p>
            </section>
            <section class="meta-block">
                <p class="meta-title">输出契约</p>
                <p class="meta-text">${escapeHtml(currentScenario.outputContract || "未配置")}</p>
            </section>
            <section>
                <p class="meta-title">示例</p>
                <div class="flow">
                    ${examples.map((example, index) => `
                        <section class="step">
                            <div class="step-number">${index + 1}</div>
                            <div>
                                <p class="step-title">${escapeHtml(example.title || example.id)}</p>
                                <p class="step-desc">${escapeHtml(example.expectedOutput || "")}</p>
                            </div>
                        </section>
                    `).join("") || "<p class=\"meta-text\">暂无示例。</p>"}
                </div>
            </section>
        `;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
</body>
</html>
