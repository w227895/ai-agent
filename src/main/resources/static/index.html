<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>大模型配置平台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f4f6fb;
            color: #1f2937;
        }
        button, input, select, textarea { font: inherit; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            flex: 0 0 220px;
            background: #111827;
            color: #fff;
            padding: 24px 16px;
        }
        .logo { font-size: 18px; font-weight: 700; margin-bottom: 32px; }
        .menu-item {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            color: #cbd5e1;
            font-weight: 600;
        }
        .menu-item.active { background: #2563eb; color: #fff; }
        .main { flex: 1; min-width: 0; padding: 24px; }
        .page-header {
            background: #fff;
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, .05);
        }
        .top-line { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
        .page-header h1 { margin: 0 0 8px; font-size: 24px; }
        .page-header p { margin: 0; color: #64748b; }
        .message {
            min-height: 30px;
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            border-radius: 999px;
            color: #475569;
            background: #f1f5f9;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        .message:empty { display: none; }
        .message.ok { color: #15803d; background: #dcfce7; }
        .message.error { color: #b91c1c; background: #fee2e2; }
        .tabs { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab {
            padding: 10px 18px;
            border-radius: 999px;
            background: #fff;
            color: #475569;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            font-weight: 600;
        }
        .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, .05);
            margin-bottom: 20px;
            min-width: 0;
        }
        .card h2 { margin: 0 0 16px; font-size: 20px; }
        .search-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #475569;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
            background: #fff;
            color: #111827;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
        }
        input[disabled], select[disabled], textarea[disabled] {
            background: #f8fafc;
            color: #64748b;
        }
        textarea { resize: vertical; min-height: 120px; }
        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        button:disabled { opacity: .55; cursor: not-allowed; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-default { background: #f1f5f9; color: #334155; }
        .btn-danger { background: #fee2e2; color: #dc2626; }
        .btn-link { background: transparent; color: #2563eb; padding: 4px 6px; }
        .btn-link.danger { color: #dc2626; }
        .table-wrap { width: 100%; overflow: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            text-align: left;
            background: #f8fafc;
            color: #475569;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
        tr:hover td { background: #f9fafb; }
        .code-cell {
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
            font-family: Consolas, "Microsoft YaHei", monospace;
        }
        .prompt-text {
            max-width: 320px;
            max-height: 64px;
            overflow: hidden;
            color: #64748b;
            line-height: 1.5;
        }
        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        .tag-green { background: #dcfce7; color: #15803d; }
        .tag-red { background: #fee2e2; color: #b91c1c; }
        .tag-blue { background: #dbeafe; color: #1d4ed8; }
        .tag-gray { background: #f1f5f9; color: #475569; }
        .type-value { color: #64748b; font-size: 12px; margin-top: 3px; }
        .pager {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-top: 14px;
            color: #64748b;
        }
        .test-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field-block { margin-bottom: 16px; }
        .result-box {
            background: #0f172a;
            color: #dbeafe;
            padding: 16px;
            border-radius: 10px;
            min-height: 360px;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow: auto;
        }
        .drawer-mask {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .45);
            display: none;
            justify-content: flex-end;
            z-index: 20;
        }
        .drawer {
            width: min(760px, 100vw);
            height: 100%;
            background: #fff;
            padding: 24px;
            overflow-y: auto;
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .drawer-header h2 { margin: 0; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field-full { grid-column: 1 / 3; }
        .drawer-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #e5e7eb;
        }
        .mono { font-family: Consolas, "Microsoft YaHei", monospace; }
        .hidden { display: none; }
        @media (max-width: 1200px) {
            .layout { display: block; }
            .sidebar { width: auto; }
            .search-grid, .test-layout, .form-grid { grid-template-columns: 1fr; }
            .field-full { grid-column: auto; }
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="logo">大模型平台</div>
        <div class="menu-item active" data-page="scenes">场景管理</div>
        <div class="menu-item" data-page="prompts">提示词管理</div>
        <div class="menu-item" data-page="test">提示词测试</div>
    </aside>

    <main class="main">
        <div class="page-header">
            <div class="top-line">
                <div>
                    <h1 id="pageTitle">场景管理</h1>
                    <p id="pageSubtitle">维护 code_type / template_type / mail_type 的业务场景含义，并供提示词直接关联。</p>
                </div>
                <div class="message" id="message"></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-page="scenes">场景管理</div>
            <div class="tab" data-page="prompts">提示词管理</div>
            <div class="tab" data-page="test">提示词测试</div>
        </div>

        <section id="page-scenes">
            <div class="card">
                <div class="search-grid">
                    <div>
                        <label>场景搜索</label>
                        <input id="sceneKeyword" placeholder="场景编码、名称、类型、说明">
                    </div>
                    <div></div>
                    <div></div>
                    <div class="btn-row" style="align-self:end;">
                        <button class="btn-primary" type="button" id="sceneSearchButton">查询</button>
                        <button class="btn-default" type="button" id="sceneResetButton">重置</button>
                        <button class="btn-primary" type="button" id="newSceneButton">新增场景</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>场景</th>
                            <th>代码类型</th>
                            <th>模板类型</th>
                            <th>邮件类型</th>
                            <th>状态</th>
                            <th>说明</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="sceneRows"></tbody>
                    </table>
                </div>
                <div class="pager">
                    <span id="scenePageInfo">-</span>
                    <div class="btn-row">
                        <button class="btn-default" type="button" id="scenePrevButton">上一页</button>
                        <button class="btn-default" type="button" id="sceneNextButton">下一页</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-prompts" class="hidden">
            <div class="card">
                <div class="search-grid">
                    <div>
                        <label>提示词搜索</label>
                        <input id="promptKeyword" placeholder="代码、提示词、场景">
                    </div>
                    <div>
                        <label>场景</label>
                        <select id="promptSceneFilter"></select>
                    </div>
                    <div>
                        <label>启用状态</label>
                        <select id="promptActiveFilter">
                            <option value="">全部</option>
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                    <div class="btn-row" style="align-self:end;">
                        <button class="btn-primary" type="button" id="promptSearchButton">查询</button>
                        <button class="btn-default" type="button" id="promptResetButton">重置</button>
                        <button class="btn-primary" type="button" id="newPromptButton">新增配置</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>代码</th>
                            <th>场景</th>
                            <th>代码类型</th>
                            <th>模板类型</th>
                            <th>邮件类型</th>
                            <th>优先级</th>
                            <th>状态</th>
                            <th>用户提示词</th>
                            <th>更新时间</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody id="promptRows"></tbody>
                    </table>
                </div>
                <div class="pager">
                    <span id="promptPageInfo">-</span>
                    <div class="btn-row">
                        <button class="btn-default" type="button" id="promptPrevButton">上一页</button>
                        <button class="btn-default" type="button" id="promptNextButton">下一页</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-test" class="hidden">
            <div class="test-layout">
                <div class="card">
                    <h2>测试入参</h2>
                    <div class="field-block">
                        <label>选择提示词</label>
                        <select id="testPrompt"></select>
                    </div>
                    <div class="field-block">
                        <label>发件人</label>
                        <input id="sender" placeholder="可选，不选择提示词时按邮箱自动匹配">
                    </div>
                    <div class="field-block">
                        <label>邮件内容</label>
                        <textarea class="mono" id="emailContent" style="min-height:260px;"></textarea>
                    </div>
                    <div class="field-block">
                        <label>补充变量，可选</label>
                        <textarea class="mono" id="extraVariables" style="min-height:100px;" placeholder='{"orderId":"32483642594336"}'></textarea>
                    </div>
                    <div class="btn-row">
                        <button class="btn-primary" type="button" id="runTestButton">执行测试</button>
                        <button class="btn-default" type="button" id="sampleButton">填入样例</button>
                        <button class="btn-default" type="button" id="clearButton">清空</button>
                    </div>
                </div>

                <div class="card">
                    <h2>测试结果</h2>
                    <div class="btn-row" style="margin-bottom:16px;">
                        <button class="btn-primary" type="button" data-result-tab="result">结果</button>
                        <button class="btn-default" type="button" data-result-tab="prompt">最终 Prompt</button>
                        <span class="tag tag-gray" id="testMeta">未执行</span>
                    </div>
                    <div class="result-box" id="testResult"></div>
                    <div class="result-box hidden" id="finalPrompt"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="drawer-mask" id="sceneDrawerMask">
    <form class="drawer" id="sceneForm">
        <div class="drawer-header">
            <h2 id="sceneDrawerTitle">编辑场景</h2>
            <button class="btn-default" type="button" data-close-scene>关闭</button>
        </div>
        <div class="form-grid">
            <div>
                <label>ID</label>
                <input id="sceneId" disabled>
            </div>
            <div>
                <label>场景编码 scene_code</label>
                <input id="sceneCode" required maxlength="100">
            </div>
            <div>
                <label>场景名称 scene_name</label>
                <input id="sceneName" required maxlength="100">
            </div>
            <div>
                <label>是否启用</label>
                <select id="sceneActive">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div>
                <label>代码类型 code_type</label>
                <input id="sceneCodeType" required maxlength="50">
            </div>
            <div>
                <label>代码类型名称</label>
                <input id="sceneCodeTypeName" required maxlength="100">
            </div>
            <div>
                <label>模板类型 template_type</label>
                <input id="sceneTemplateType" required maxlength="50">
            </div>
            <div>
                <label>模板类型名称</label>
                <input id="sceneTemplateTypeName" required maxlength="100">
            </div>
            <div>
                <label>邮件类型 mail_type</label>
                <input id="sceneMailType" type="number" step="1">
            </div>
            <div>
                <label>邮件类型名称</label>
                <input id="sceneMailTypeName" required maxlength="100">
            </div>
            <div class="field-full">
                <label>说明 description</label>
                <textarea id="sceneDescription" maxlength="500"></textarea>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="btn-danger" type="button" id="deleteSceneButton">删除</button>
            <button class="btn-default" type="button" id="toggleSceneButton">启停</button>
            <button class="btn-default" type="button" data-close-scene>取消</button>
            <button class="btn-primary" type="submit" id="saveSceneButton">保存</button>
        </div>
    </form>
</div>

<div class="drawer-mask" id="promptDrawerMask">
    <form class="drawer" id="promptForm">
        <div class="drawer-header">
            <h2 id="promptDrawerTitle">编辑提示词</h2>
            <button class="btn-default" type="button" data-close-prompt>关闭</button>
        </div>
        <div class="form-grid">
            <div>
                <label>ID</label>
                <input id="promptId" disabled>
            </div>
            <div>
                <label>代码 prompt_code</label>
                <input id="promptCode" required maxlength="500">
            </div>
            <div class="field-full">
                <label>场景</label>
                <select id="promptScene" required></select>
            </div>
            <div>
                <label>代码类型</label>
                <input id="promptCodeTypeDisplay" disabled>
            </div>
            <div>
                <label>模板类型</label>
                <input id="promptTemplateTypeDisplay" disabled>
            </div>
            <div>
                <label>邮件类型</label>
                <input id="promptMailTypeDisplay" disabled>
            </div>
            <div>
                <label>优先级 priority</label>
                <input id="priority" type="number" step="1">
            </div>
            <div>
                <label>是否启用 is_active</label>
                <select id="promptActive">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div class="field-full">
                <label>系统提示词 system_prompt</label>
                <textarea class="mono" id="systemPrompt" maxlength="8000" style="min-height:180px;"></textarea>
            </div>
            <div class="field-full">
                <label>用户提示词 user_prompt</label>
                <textarea class="mono" id="userPrompt" maxlength="2048" style="min-height:150px;"></textarea>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="btn-danger" type="button" id="deletePromptButton">删除</button>
            <button class="btn-default" type="button" id="togglePromptButton">启停</button>
            <button class="btn-default" type="button" data-close-prompt>取消</button>
            <button class="btn-primary" type="submit" id="savePromptButton">保存</button>
        </div>
    </form>
</div>

<script>
const state = {
    page: "scenes",
    resultTab: "result",
    dictionaries: {codeTypes: [], templateTypes: [], mailTypes: [], scenarios: []},
    activeScenes: [],
    scenes: [],
    prompts: [],
    scenePage: {page: 1, size: 20, total: 0, totalPages: 1, keyword: ""},
    promptPage: {page: 1, size: 20, total: 0, totalPages: 1, keyword: ""},
    editingScene: null,
    sceneMode: "edit",
    editingPrompt: null,
    promptMode: "edit"
};

const sampleMail = `Dear Agent,

Please be advised that flight MU1234 from PVG to NRT on 20JUN has been changed.

Original departure time: 2026-06-20 10:30
New departure time: 2026-06-20 13:50

Order No: 32483642594336

Best regards,
Airline Support`;

const $ = (id) => document.getElementById(id);
const els = {
    message: $("message"),
    pageTitle: $("pageTitle"),
    pageSubtitle: $("pageSubtitle"),
    sceneKeyword: $("sceneKeyword"),
    sceneRows: $("sceneRows"),
    scenePageInfo: $("scenePageInfo"),
    scenePrevButton: $("scenePrevButton"),
    sceneNextButton: $("sceneNextButton"),
    promptKeyword: $("promptKeyword"),
    promptSceneFilter: $("promptSceneFilter"),
    promptActiveFilter: $("promptActiveFilter"),
    promptRows: $("promptRows"),
    promptPageInfo: $("promptPageInfo"),
    promptPrevButton: $("promptPrevButton"),
    promptNextButton: $("promptNextButton"),
    sceneDrawerMask: $("sceneDrawerMask"),
    sceneForm: $("sceneForm"),
    sceneDrawerTitle: $("sceneDrawerTitle"),
    sceneId: $("sceneId"),
    sceneCode: $("sceneCode"),
    sceneName: $("sceneName"),
    sceneActive: $("sceneActive"),
    sceneCodeType: $("sceneCodeType"),
    sceneCodeTypeName: $("sceneCodeTypeName"),
    sceneTemplateType: $("sceneTemplateType"),
    sceneTemplateTypeName: $("sceneTemplateTypeName"),
    sceneMailType: $("sceneMailType"),
    sceneMailTypeName: $("sceneMailTypeName"),
    sceneDescription: $("sceneDescription"),
    deleteSceneButton: $("deleteSceneButton"),
    toggleSceneButton: $("toggleSceneButton"),
    saveSceneButton: $("saveSceneButton"),
    promptDrawerMask: $("promptDrawerMask"),
    promptForm: $("promptForm"),
    promptDrawerTitle: $("promptDrawerTitle"),
    promptId: $("promptId"),
    promptCode: $("promptCode"),
    promptScene: $("promptScene"),
    promptCodeTypeDisplay: $("promptCodeTypeDisplay"),
    promptTemplateTypeDisplay: $("promptTemplateTypeDisplay"),
    promptMailTypeDisplay: $("promptMailTypeDisplay"),
    priority: $("priority"),
    promptActive: $("promptActive"),
    systemPrompt: $("systemPrompt"),
    userPrompt: $("userPrompt"),
    deletePromptButton: $("deletePromptButton"),
    togglePromptButton: $("togglePromptButton"),
    savePromptButton: $("savePromptButton"),
    testPrompt: $("testPrompt"),
    sender: $("sender"),
    emailContent: $("emailContent"),
    extraVariables: $("extraVariables"),
    testResult: $("testResult"),
    finalPrompt: $("finalPrompt"),
    testMeta: $("testMeta")
};

document.querySelectorAll("[data-page]").forEach((node) => {
    node.addEventListener("click", () => showPage(node.dataset.page));
});
document.querySelectorAll("[data-result-tab]").forEach((node) => {
    node.addEventListener("click", () => showResultTab(node.dataset.resultTab));
});
document.querySelectorAll("[data-close-scene]").forEach((node) => node.addEventListener("click", closeSceneDrawer));
document.querySelectorAll("[data-close-prompt]").forEach((node) => node.addEventListener("click", closePromptDrawer));

$("sceneSearchButton").addEventListener("click", () => {
    state.scenePage.keyword = els.sceneKeyword.value.trim();
    state.scenePage.page = 1;
    loadScenes();
});
$("sceneResetButton").addEventListener("click", resetSceneSearch);
$("newSceneButton").addEventListener("click", () => openSceneDrawer(emptyScene(), "edit"));
els.scenePrevButton.addEventListener("click", () => changeScenePage(-1));
els.sceneNextButton.addEventListener("click", () => changeScenePage(1));
els.sceneRows.addEventListener("click", onSceneAction);
els.sceneForm.addEventListener("submit", saveScene);
els.deleteSceneButton.addEventListener("click", () => deleteScene(state.editingScene));
els.toggleSceneButton.addEventListener("click", () => toggleScene(state.editingScene));

$("promptSearchButton").addEventListener("click", () => {
    state.promptPage.keyword = els.promptKeyword.value.trim();
    state.promptPage.page = 1;
    loadPrompts();
});
$("promptResetButton").addEventListener("click", resetPromptSearch);
$("newPromptButton").addEventListener("click", () => openPromptDrawer(emptyPrompt(), "edit"));
els.promptPrevButton.addEventListener("click", () => changePromptPage(-1));
els.promptNextButton.addEventListener("click", () => changePromptPage(1));
els.promptRows.addEventListener("click", onPromptAction);
els.promptForm.addEventListener("submit", savePrompt);
els.deletePromptButton.addEventListener("click", () => deletePrompt(state.editingPrompt));
els.togglePromptButton.addEventListener("click", () => togglePrompt(state.editingPrompt));
els.promptScene.addEventListener("change", renderPromptSceneFields);

$("runTestButton").addEventListener("click", runTest);
$("sampleButton").addEventListener("click", () => els.emailContent.value = sampleMail);
$("clearButton").addEventListener("click", clearTest);
els.emailContent.value = sampleMail;

bootstrap();

async function bootstrap() {
    await refreshSceneData();
    await loadScenes();
    await loadPrompts();
}

async function refreshSceneData() {
    state.dictionaries = await getJson("/api/dictionaries");
    state.activeScenes = await getJson("/api/scenes/active");
    renderSceneControls();
}

function renderSceneControls() {
    const sceneOptions = [`<option value="">全部场景</option>`].concat(
        state.dictionaries.scenarios.map((scene) => `<option value="${scene.id}">${escapeHtml(scene.sceneName)}</option>`)
    );
    els.promptSceneFilter.innerHTML = sceneOptions.join("");
    renderPromptSceneOptions();
}

function renderPromptSceneOptions(selectedId = "") {
    const current = selectedId || els.promptScene.value;
    const options = [`<option value="">请选择场景</option>`].concat(
        state.activeScenes.map((scene) => `<option value="${scene.id}">${escapeHtml(scene.sceneName)} (${escapeHtml(scene.codeType)}/${escapeHtml(scene.templateType)}/${escapeHtml(scene.mailType)})</option>`)
    );
    const currentScene = findSceneById(current);
    if (current && currentScene && !currentScene.active && !state.activeScenes.some((scene) => String(scene.id) === String(current))) {
        options.push(`<option value="${currentScene.id}">${escapeHtml(currentScene.sceneName)}（已禁用）</option>`);
    }
    els.promptScene.innerHTML = options.join("");
    els.promptScene.value = current;
    renderPromptSceneFields();
}

function showPage(page) {
    state.page = page;
    document.querySelectorAll("[data-page]").forEach((node) => node.classList.toggle("active", node.dataset.page === page));
    $("page-scenes").classList.toggle("hidden", page !== "scenes");
    $("page-prompts").classList.toggle("hidden", page !== "prompts");
    $("page-test").classList.toggle("hidden", page !== "test");
    const titles = {
        scenes: ["场景管理", "维护 code_type / template_type / mail_type 的业务场景含义，并供提示词直接关联。"],
        prompts: ["提示词管理", "维护 llm_prompt 表配置，提示词通过 scene_id 关联场景。"],
        test: ["提示词测试", "选择提示词和邮件内容，直接调用大模型查看返回结果。"]
    };
    els.pageTitle.textContent = titles[page][0];
    els.pageSubtitle.textContent = titles[page][1];
    if (page === "test") renderTestOptions();
}

async function loadScenes() {
    const page = await getJson(`/api/scenes?page=${state.scenePage.page}&size=${state.scenePage.size}&keyword=${encodeURIComponent(state.scenePage.keyword)}`);
    state.scenes = page.items || [];
    state.scenePage.total = page.total || 0;
    state.scenePage.totalPages = page.totalPages || 1;
    renderSceneRows();
}

function renderSceneRows() {
    if (!state.scenes.length) {
        els.sceneRows.innerHTML = `<tr><td colspan="9">暂无场景</td></tr>`;
    } else {
        els.sceneRows.innerHTML = state.scenes.map((scene) => `
            <tr>
                <td>${scene.id}</td>
                <td><div class="code-cell">${escapeHtml(scene.sceneName)}</div><div class="type-value">${escapeHtml(scene.sceneCode)}</div></td>
                <td>${escapeHtml(scene.codeType)} - ${escapeHtml(scene.codeTypeName)}</td>
                <td>${escapeHtml(scene.templateType)} - ${escapeHtml(scene.templateTypeName)}</td>
                <td>${escapeHtml(scene.mailType)} - ${escapeHtml(scene.mailTypeName)}</td>
                <td><span class="tag ${scene.active ? "tag-green" : "tag-red"}">${scene.active ? "启用" : "禁用"}</span></td>
                <td><div class="prompt-text">${escapeHtml(scene.description)}</div></td>
                <td>${formatTime(scene.updateTime)}</td>
                <td>
                    <button class="btn-link" type="button" data-scene-action="view" data-id="${scene.id}">查看</button>
                    <button class="btn-link" type="button" data-scene-action="edit" data-id="${scene.id}">编辑</button>
                    <button class="btn-link" type="button" data-scene-action="toggle" data-id="${scene.id}">${scene.active ? "禁用" : "启用"}</button>
                    <button class="btn-link danger" type="button" data-scene-action="delete" data-id="${scene.id}">删除</button>
                </td>
            </tr>
        `).join("");
    }
    els.scenePageInfo.textContent = `第 ${state.scenePage.page} / ${state.scenePage.totalPages} 页，共 ${state.scenePage.total} 条`;
    els.scenePrevButton.disabled = state.scenePage.page <= 1;
    els.sceneNextButton.disabled = state.scenePage.page >= state.scenePage.totalPages;
}

async function loadPrompts() {
    const page = await getJson(`/api/prompts?page=${state.promptPage.page}&size=${state.promptPage.size}&keyword=${encodeURIComponent(state.promptPage.keyword)}`);
    state.prompts = (page.items || []).filter(matchesPromptFilters);
    state.promptPage.total = page.total || 0;
    state.promptPage.totalPages = page.totalPages || 1;
    renderPromptRows();
    renderTestOptions();
}

function matchesPromptFilters(prompt) {
    if (els.promptSceneFilter.value) {
        const scene = resolvePromptScene(prompt);
        if (!scene || String(scene.id) !== els.promptSceneFilter.value) return false;
    }
    if (els.promptActiveFilter.value && String(prompt.active) !== els.promptActiveFilter.value) return false;
    return true;
}

function renderPromptRows() {
    if (!state.prompts.length) {
        els.promptRows.innerHTML = `<tr><td colspan="11">暂无提示词</td></tr>`;
    } else {
        els.promptRows.innerHTML = state.prompts.map((prompt) => {
            const scene = resolvePromptScene(prompt);
            return `
                <tr>
                    <td>${prompt.id}</td>
                    <td><div class="code-cell" title="${escapeHtml(prompt.promptCode)}">${escapeHtml(prompt.promptCode)}</div></td>
                    <td>${scene ? `<span class="tag tag-blue">${escapeHtml(scene.sceneName)}</span><div class="type-value">${escapeHtml(scene.sceneCode || "")}</div>` : `<span class="tag tag-gray">未配置场景</span>`}</td>
                    <td>${dictValue("codeTypes", prompt.codeType)}</td>
                    <td>${dictValue("templateTypes", prompt.templateType)}</td>
                    <td>${dictValue("mailTypes", prompt.mailType)}</td>
                    <td>${prompt.priority ?? 0}</td>
                    <td><span class="tag ${prompt.active ? "tag-green" : "tag-red"}">${prompt.active ? "启用" : "禁用"}</span></td>
                    <td><div class="prompt-text">${escapeHtml(prompt.userPrompt)}</div></td>
                    <td>${formatTime(prompt.updateTime)}</td>
                    <td>
                        <button class="btn-link" type="button" data-prompt-action="view" data-id="${prompt.id}">查看</button>
                        <button class="btn-link" type="button" data-prompt-action="edit" data-id="${prompt.id}">编辑</button>
                        <button class="btn-link" type="button" data-prompt-action="toggle" data-id="${prompt.id}">${prompt.active ? "禁用" : "启用"}</button>
                        <button class="btn-link danger" type="button" data-prompt-action="delete" data-id="${prompt.id}">删除</button>
                    </td>
                </tr>`;
        }).join("");
    }
    els.promptPageInfo.textContent = `第 ${state.promptPage.page} / ${state.promptPage.totalPages} 页，共 ${state.promptPage.total} 条`;
    els.promptPrevButton.disabled = state.promptPage.page <= 1;
    els.promptNextButton.disabled = state.promptPage.page >= state.promptPage.totalPages;
}

function onSceneAction(event) {
    const button = event.target.closest("[data-scene-action]");
    if (!button) return;
    const scene = state.scenes.find((item) => item.id === Number(button.dataset.id));
    if (!scene) return;
    if (button.dataset.sceneAction === "view") openSceneDrawer(scene, "view");
    if (button.dataset.sceneAction === "edit") openSceneDrawer(scene, "edit");
    if (button.dataset.sceneAction === "toggle") toggleScene(scene);
    if (button.dataset.sceneAction === "delete") deleteScene(scene);
}

function onPromptAction(event) {
    const button = event.target.closest("[data-prompt-action]");
    if (!button) return;
    const prompt = state.prompts.find((item) => item.id === Number(button.dataset.id));
    if (!prompt) return;
    if (button.dataset.promptAction === "view") openPromptDrawer(prompt, "view");
    if (button.dataset.promptAction === "edit") openPromptDrawer(prompt, "edit");
    if (button.dataset.promptAction === "toggle") togglePrompt(prompt);
    if (button.dataset.promptAction === "delete") deletePrompt(prompt);
}

function openSceneDrawer(scene, mode) {
    state.editingScene = scene;
    state.sceneMode = mode;
    els.sceneDrawerTitle.textContent = scene.id == null ? "新增场景" : mode === "view" ? `查看场景 #${scene.id}` : `编辑场景 #${scene.id}`;
    els.sceneId.value = scene.id ?? "";
    els.sceneCode.value = scene.sceneCode || "";
    els.sceneName.value = scene.sceneName || "";
    els.sceneActive.value = String(scene.active ?? true);
    els.sceneCodeType.value = scene.codeType || "";
    els.sceneCodeTypeName.value = scene.codeTypeName || "";
    els.sceneTemplateType.value = scene.templateType || "";
    els.sceneTemplateTypeName.value = scene.templateTypeName || "";
    els.sceneMailType.value = scene.mailType ?? 0;
    els.sceneMailTypeName.value = scene.mailTypeName || "";
    els.sceneDescription.value = scene.description || "";
    setSceneReadonly(mode === "view");
    els.sceneDrawerMask.style.display = "flex";
}

function closeSceneDrawer() {
    els.sceneDrawerMask.style.display = "none";
    state.editingScene = null;
    state.sceneMode = "edit";
    setSceneReadonly(false);
}

function setSceneReadonly(readonly) {
    [els.sceneCode, els.sceneName, els.sceneActive, els.sceneCodeType, els.sceneCodeTypeName,
        els.sceneTemplateType, els.sceneTemplateTypeName, els.sceneMailType, els.sceneMailTypeName, els.sceneDescription]
        .forEach((element) => element.disabled = readonly);
    els.deleteSceneButton.style.display = readonly ? "none" : "";
    els.toggleSceneButton.style.display = readonly ? "none" : "";
    els.saveSceneButton.style.display = readonly ? "none" : "";
}

async function saveScene(event) {
    event.preventDefault();
    if (state.sceneMode === "view") return;
    const id = Number(els.sceneId.value || 0);
    const payload = {
        sceneCode: els.sceneCode.value.trim(),
        sceneName: els.sceneName.value.trim(),
        codeType: els.sceneCodeType.value.trim(),
        codeTypeName: els.sceneCodeTypeName.value.trim(),
        templateType: els.sceneTemplateType.value.trim(),
        templateTypeName: els.sceneTemplateTypeName.value.trim(),
        mailType: Number(els.sceneMailType.value || 0),
        mailTypeName: els.sceneMailTypeName.value.trim(),
        description: els.sceneDescription.value,
        active: els.sceneActive.value === "true"
    };
    if (!payload.sceneCode || !payload.sceneName) return setMessage("场景编码和名称不能为空", "error");
    try {
        await sendJson(id ? `/api/scenes/${id}` : "/api/scenes", id ? "PUT" : "POST", payload);
        closeSceneDrawer();
        await refreshSceneData();
        await loadScenes();
        await loadPrompts();
        setMessage("场景已保存", "ok");
    } catch (error) {
        setMessage(`场景保存失败：${error.message}`, "error");
    }
}

async function toggleScene(scene) {
    if (!scene?.id) return;
    try {
        await sendJson(`/api/scenes/${scene.id}/status?active=${!scene.active}`, "POST", {});
        await refreshSceneData();
        await loadScenes();
        await loadPrompts();
        setMessage(scene.active ? "场景已禁用" : "场景已启用", "ok");
    } catch (error) {
        setMessage(`场景状态更新失败：${error.message}`, "error");
    }
}

async function deleteScene(scene) {
    if (!scene?.id || !confirm(`确认删除场景 ${scene.sceneName}？`)) return;
    try {
        await deleteRequest(`/api/scenes/${scene.id}`);
        await refreshSceneData();
        await loadScenes();
        await loadPrompts();
        setMessage("场景已删除", "ok");
    } catch (error) {
        setMessage(`场景删除失败：${error.message}`, "error");
    }
}

function openPromptDrawer(prompt, mode) {
    state.editingPrompt = prompt;
    state.promptMode = mode;
    const scene = resolvePromptScene(prompt);
    const sceneId = prompt.sceneId || scene?.id || "";
    els.promptDrawerTitle.textContent = prompt.id == null ? "新增提示词" : mode === "view" ? `查看提示词 #${prompt.id}` : `编辑提示词 #${prompt.id}`;
    els.promptId.value = prompt.id ?? "";
    els.promptCode.value = prompt.promptCode || "";
    els.priority.value = prompt.priority ?? 0;
    els.promptActive.value = String(prompt.active ?? true);
    els.systemPrompt.value = prompt.systemPrompt || "";
    els.userPrompt.value = prompt.userPrompt || "";
    renderPromptSceneOptions(String(sceneId));
    setPromptReadonly(mode === "view");
    els.deletePromptButton.disabled = prompt.id == null;
    els.togglePromptButton.disabled = prompt.id == null;
    els.promptDrawerMask.style.display = "flex";
}

function closePromptDrawer() {
    els.promptDrawerMask.style.display = "none";
    state.editingPrompt = null;
    state.promptMode = "edit";
    setPromptReadonly(false);
}

function setPromptReadonly(readonly) {
    [els.promptCode, els.promptScene, els.priority, els.promptActive, els.systemPrompt, els.userPrompt]
        .forEach((element) => element.disabled = readonly);
    els.deletePromptButton.style.display = readonly ? "none" : "";
    els.togglePromptButton.style.display = readonly ? "none" : "";
    els.savePromptButton.style.display = readonly ? "none" : "";
}

async function savePrompt(event) {
    event.preventDefault();
    if (state.promptMode === "view") return;
    const scene = findSceneById(els.promptScene.value);
    if (!scene) return setMessage("请选择场景", "error");
    const id = Number(els.promptId.value || 0);
    const payload = {
        sceneId: scene.id,
        promptCode: els.promptCode.value.trim(),
        codeType: scene.codeType,
        templateType: scene.templateType,
        userPrompt: els.userPrompt.value,
        priority: Number(els.priority.value || 0),
        active: els.promptActive.value === "true",
        systemPrompt: els.systemPrompt.value,
        mailType: Number(scene.mailType || 0)
    };
    if (!payload.promptCode) return setMessage("提示词代码不能为空", "error");
    try {
        await sendJson(id ? `/api/prompts/${id}` : "/api/prompts", id ? "PUT" : "POST", payload);
        closePromptDrawer();
        await loadPrompts();
        setMessage("提示词已保存", "ok");
    } catch (error) {
        setMessage(`提示词保存失败：${error.message}`, "error");
    }
}

async function togglePrompt(prompt) {
    if (!prompt?.id) return;
    try {
        await sendJson(`/api/prompts/${prompt.id}/status?active=${!prompt.active}`, "POST", {});
        await loadPrompts();
        setMessage(prompt.active ? "提示词已禁用" : "提示词已启用", "ok");
    } catch (error) {
        setMessage(`提示词状态更新失败：${error.message}`, "error");
    }
}

async function deletePrompt(prompt) {
    if (!prompt?.id || !confirm(`确认删除提示词 ${prompt.promptCode}？`)) return;
    try {
        await deleteRequest(`/api/prompts/${prompt.id}`);
        await loadPrompts();
        setMessage("提示词已删除", "ok");
    } catch (error) {
        setMessage(`提示词删除失败：${error.message}`, "error");
    }
}

function renderPromptSceneFields() {
    const scene = findSceneById(els.promptScene.value);
    els.promptCodeTypeDisplay.value = scene ? `${scene.codeType} - ${scene.codeTypeName}` : "";
    els.promptTemplateTypeDisplay.value = scene ? `${scene.templateType} - ${scene.templateTypeName}` : "";
    els.promptMailTypeDisplay.value = scene ? `${scene.mailType} - ${scene.mailTypeName}` : "";
}

function renderTestOptions() {
    const current = els.testPrompt.value;
    els.testPrompt.innerHTML = [`<option value="">按发件人自动匹配</option>`].concat(
        state.prompts.map((prompt) => {
            const scene = resolvePromptScene(prompt);
            return `<option value="${prompt.id}">#${prompt.id} ${escapeHtml(prompt.promptCode)} / ${escapeHtml(scene?.sceneName || "未配置场景")}</option>`;
        })
    ).join("");
    els.testPrompt.value = state.prompts.some((prompt) => String(prompt.id) === current) ? current : "";
}

async function runTest() {
    const promptId = els.testPrompt.value ? Number(els.testPrompt.value) : null;
    const emailContent = appendExtraVariables(els.emailContent.value, els.extraVariables.value);
    if (!emailContent.trim()) return setMessage("邮件内容不能为空", "error");
    els.testResult.textContent = "正在调用模型...";
    els.finalPrompt.textContent = "";
    els.testMeta.textContent = "执行中";
    showResultTab("result");
    try {
        const response = await sendJson("/api/test", "POST", {
            promptId,
            promptCode: "",
            sender: els.sender.value.trim(),
            emailContent
        });
        els.testResult.textContent = response.result || "";
        els.finalPrompt.textContent = response.finalPrompt || "";
        els.testMeta.textContent = `成功 | ${response.elapsedMs || 0}ms | #${response.prompt?.id || "-"}`;
        setMessage("测试完成", "ok");
    } catch (error) {
        els.testResult.textContent = `调用失败：${error.message}`;
        els.testMeta.textContent = "失败";
        setMessage(`测试失败：${error.message}`, "error");
    }
}

function showResultTab(tab) {
    state.resultTab = tab;
    document.querySelectorAll("[data-result-tab]").forEach((button) => {
        const active = button.dataset.resultTab === tab;
        button.className = active ? "btn-primary" : "btn-default";
    });
    els.testResult.classList.toggle("hidden", tab !== "result");
    els.finalPrompt.classList.toggle("hidden", tab !== "prompt");
}

function appendExtraVariables(content, variables) {
    const trimmed = variables.trim();
    if (!trimmed) return content;
    return `${content.trim()}\n\n补充变量：\n${trimmed}`;
}

function clearTest() {
    els.sender.value = "";
    els.emailContent.value = "";
    els.extraVariables.value = "";
    els.testResult.textContent = "";
    els.finalPrompt.textContent = "";
    els.testMeta.textContent = "未执行";
}

function resetSceneSearch() {
    els.sceneKeyword.value = "";
    state.scenePage.keyword = "";
    state.scenePage.page = 1;
    loadScenes();
}

function resetPromptSearch() {
    els.promptKeyword.value = "";
    els.promptSceneFilter.value = "";
    els.promptActiveFilter.value = "";
    state.promptPage.keyword = "";
    state.promptPage.page = 1;
    loadPrompts();
}

function changeScenePage(delta) {
    const next = state.scenePage.page + delta;
    if (next < 1 || next > state.scenePage.totalPages) return;
    state.scenePage.page = next;
    loadScenes();
}

function changePromptPage(delta) {
    const next = state.promptPage.page + delta;
    if (next < 1 || next > state.promptPage.totalPages) return;
    state.promptPage.page = next;
    loadPrompts();
}

function emptyScene() {
    return {
        id: null,
        sceneCode: "",
        sceneName: "",
        codeType: "2",
        codeTypeName: "邮箱",
        templateType: "1",
        templateTypeName: "航变解析模板",
        mailType: 0,
        mailTypeName: "类型识别",
        description: "",
        active: true
    };
}

function emptyPrompt() {
    return {
        id: null,
        sceneId: null,
        promptCode: "",
        userPrompt: "解析航班变更邮件并返回结构化JSON数据：\\n\\n当前时间：{current_time}\\n邮件内容：\\n{email_content}\\n\\n请从邮件内容中提取航班变更信息，并映射到指定的JSON结构。只返回纯JSON数据，不要其他内容。",
        priority: 1,
        active: true,
        systemPrompt: "",
        mailType: 0
    };
}

function findSceneById(id) {
    if (!id) return null;
    return (state.dictionaries.scenarios || []).find((scene) => String(scene.id) === String(id)) || null;
}

function resolvePromptScene(prompt) {
    return findSceneById(prompt.sceneId) || (state.dictionaries.scenarios || []).find((scene) =>
        String(scene.codeType) === String(prompt.codeType)
        && String(scene.templateType) === String(prompt.templateType)
        && String(scene.mailType) === String(prompt.mailType)) || null;
}

function dictValue(name, value) {
    const rawValue = String(value ?? "");
    const label = plainDictLabel(name, value);
    return label === rawValue
        ? escapeHtml(rawValue)
        : `<span>${escapeHtml(rawValue)} - ${escapeHtml(label)}</span><div class="type-value">${escapeHtml(rawValue)}</div>`;
}

function plainDictLabel(name, value) {
    const rawValue = String(value ?? "");
    const item = (state.dictionaries[name] || []).find((candidate) => String(candidate.value) === rawValue);
    return item ? item.label : rawValue;
}

async function getJson(url) {
    const response = await fetch(url);
    if (!response.ok) throw new Error(await errorMessage(response));
    return response.json();
}

async function sendJson(url, method, payload) {
    const response = await fetch(url, {
        method,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(await errorMessage(response));
    return response.status === 204 ? null : response.json();
}

async function deleteRequest(url) {
    const response = await fetch(url, {method: "DELETE"});
    if (!response.ok) throw new Error(await errorMessage(response));
}

async function errorMessage(response) {
    try {
        const body = await response.json();
        return body.message || `HTTP ${response.status}`;
    } catch (error) {
        return `HTTP ${response.status}`;
    }
}

function setMessage(text, type = "") {
    els.message.textContent = text || "";
    els.message.className = `message ${type}`.trim();
}

function formatTime(value) {
    return value ? String(value).replace("T", " ").slice(0, 19) : "";
}

function escapeHtml(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
</script>
